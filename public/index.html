<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>abcxyz-offical-server-chat</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
:root{
  --bg:#0d0f14;--surface:#141720;--card:#1a1e2e;--border:#252a3a;
  --accent:#e8504a;--accent2:#ff7b75;--gold:#f5c842;--green:#2ed573;
  --blue:#4a9eff;--text:#e8eaf0;--muted:#6b7280;--r:14px;
  --font:'Space Grotesk',sans-serif;--mono:'JetBrains Mono',monospace;
  --sidebar:260px;--topbar:56px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font)}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ── LAYOUT ── */
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{
  width:var(--sidebar);min-width:var(--sidebar);max-width:var(--sidebar);
  background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;transition:transform .25s ease;z-index:50;
}
#main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}

/* ── TOPBAR ── */
#topbar{
  height:var(--topbar);padding:0 16px;
  background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;gap:10px;
}
.topbar-left{display:flex;align-items:center;gap:10px;min-width:0}
.menu-btn{display:none;width:36px;height:36px;border:none;background:transparent;color:var(--text);cursor:pointer;font-size:20px;align-items:center;justify-content:center;flex-shrink:0}
.topbar-av{width:34px;height:34px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;overflow:hidden;flex-shrink:0}
.topbar-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.topbar-info{min-width:0}
.topbar-title{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar-sub{font-size:11px;color:var(--muted);white-space:nowrap}
.topbar-right{display:flex;gap:6px;flex-shrink:0}
.icon-btn{width:34px;height:34px;border-radius:8px;border:none;background:var(--card);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:.15s;flex-shrink:0}
.icon-btn:hover,.icon-btn:active{background:var(--border)}

/* ── SIDEBAR ── */
.sidebar-logo{padding:14px 14px 10px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}
.logo-icon{width:34px;height:34px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.logo-text{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.logo-sub{font-size:9px;color:var(--muted);font-family:var(--mono);white-space:nowrap}
.sidebar-nav{display:flex;gap:2px;padding:8px 10px;border-bottom:1px solid var(--border)}
.nav-btn{flex:1;padding:7px 2px;border:none;background:transparent;color:var(--muted);cursor:pointer;border-radius:7px;font-family:var(--font);font-size:10px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:3px;transition:.15s}
.nav-btn:hover{background:var(--card);color:var(--text)}
.nav-btn.active{background:var(--accent);color:#fff}
.nav-btn .ni{font-size:15px}
.sidebar-search{padding:8px 10px}
.search-in{width:100%;padding:7px 10px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font);font-size:12px;outline:none}
.sidebar-list{flex:1;overflow-y:auto;padding:4px 6px}
.s-item{padding:8px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:.1s;margin-bottom:2px}
.s-item:hover,.s-item.active{background:var(--card)}
.s-av{width:34px;height:34px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;overflow:hidden;position:relative}
.s-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.online-dot{position:absolute;bottom:0;right:0;width:9px;height:9px;background:var(--green);border:2px solid var(--surface);border-radius:50%}
.s-info{min-width:0;flex:1}
.s-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.s-sub{font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}

/* ── CONTENT AREA ── */
#content{flex:1;overflow:hidden;display:flex;flex-direction:column}

/* ── FEED ── */
#feed-view{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px;align-items:center}
.composer{width:100%;max-width:560px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px}
.comp-row{display:flex;gap:10px;align-items:flex-start}
.comp-in{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-family:var(--font);font-size:13px;resize:none;outline:none;min-height:40px;max-height:100px}
.comp-in:focus{border-color:var(--accent)}
.comp-actions{display:flex;justify-content:flex-end;margin-top:8px;gap:6px}
.post-card{width:100%;max-width:560px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;animation:slideIn .25s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.post-hdr{padding:12px 14px 0;display:flex;align-items:center;gap:8px}
.post-author{font-size:13px;font-weight:600}
.game-badge{font-size:8px;font-family:var(--mono);background:var(--accent);color:#fff;padding:2px 5px;border-radius:3px;margin-left:4px}
.post-body{padding:10px 14px;font-size:13px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.post-img{width:100%;max-height:260px;object-fit:cover}
.post-actions{padding:6px 14px 10px;display:flex;gap:2px;border-top:1px solid var(--border)}
.act-btn{padding:5px 12px;border:none;background:transparent;color:var(--muted);cursor:pointer;border-radius:7px;font-family:var(--font);font-size:12px;font-weight:500;display:flex;align-items:center;gap:5px;transition:.15s}
.act-btn:hover,.act-btn:active{background:var(--surface);color:var(--text)}
.act-btn.liked{color:var(--accent)}
.comments-sec{border-top:1px solid var(--border);padding:6px 14px}
.cmt-item{display:flex;gap:7px;padding:5px 0}
.cmt-author{font-size:11px;font-weight:600;color:var(--accent)}
.cmt-text{font-size:12px;margin-top:1px;line-height:1.5;word-break:break-word}
.cmt-in-row{display:flex;gap:7px;margin-top:7px}
.cmt-in{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:6px 12px;color:var(--text);font-family:var(--font);font-size:12px;outline:none}
.cmt-in:focus{border-color:var(--accent)}

/* ── CHAT VIEW (dùng cho cả DM lẫn Global) ── */
#chat-view{flex:1;display:flex;flex-direction:column;min-height:0}
.chat-msgs{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:8px}

/* ── GLOBAL BANNER (hiện trong chat-msgs khi ở global) ── */
.global-banner{
  text-align:center;padding:10px 14px;margin-bottom:4px;
  background:linear-gradient(90deg,rgba(74,158,255,.08),rgba(74,158,255,.16),rgba(74,158,255,.08));
  border:1px solid rgba(74,158,255,.25);border-radius:10px;
  font-size:11px;color:var(--blue);font-weight:600;
}

/* ── MESSAGE ROW ── */
.msg-row{display:flex;gap:8px;align-items:flex-end;max-width:100%}
.msg-row.own{flex-direction:row-reverse}
.msg-av{width:26px;height:26px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;overflow:hidden}
.msg-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.msg-group{display:flex;flex-direction:column;gap:2px;max-width:75%;min-width:0}
.msg-row.own .msg-group{align-items:flex-end}
.msg-sender{font-size:10px;font-weight:600;color:var(--accent);margin-bottom:1px}
.msg-bubble{
  display:inline-block;
  padding:8px 12px;border-radius:14px;
  font-size:13px;line-height:1.5;
  word-break:break-word;word-wrap:break-word;white-space:pre-wrap;max-width:100%;
}
.msg-row:not(.own) .msg-bubble{background:var(--card);border-bottom-left-radius:4px}
.msg-row.own .msg-bubble{background:var(--accent);color:#fff;border-bottom-right-radius:4px}
.msg-row.game .msg-bubble{background:var(--card);border:1px solid rgba(74,158,255,.4);border-bottom-left-radius:4px}
.msg-meta{font-size:9px;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:3px}
.msg-row.own .msg-meta{justify-content:flex-end}
.game-tag{font-size:8px;font-family:var(--mono);background:var(--blue);color:#fff;padding:1px 4px;border-radius:3px}
.trans-hint{font-size:9px;color:var(--muted);font-style:italic}

/* ── INPUT AREA ── */
.chat-input-area{
  padding:10px 12px;background:var(--surface);
  border-top:1px solid var(--border);
  display:flex;gap:8px;align-items:flex-end;flex-shrink:0;
}
.chat-in{
  flex:1;background:var(--card);border:1px solid var(--border);
  border-radius:20px;padding:9px 14px;color:var(--text);
  font-family:var(--font);font-size:13px;resize:none;outline:none;
  min-height:40px;max-height:100px;line-height:1.4;
}
.chat-in:focus{border-color:var(--accent)}
.send-btn{
  width:40px;height:40px;border-radius:50%;border:none;
  background:var(--accent);color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;transition:.15s;
}
.send-btn:hover,.send-btn:active{background:var(--accent2)}
/* Global send btn màu xanh */
.send-btn.global{background:var(--blue)}
.send-btn.global:hover{background:#6db3ff}

/* ── PROFILE ── */
#profile-view{flex:1;overflow-y:auto;padding:14px}
.prof-hdr{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:14px}
.prof-cover{height:120px;background:linear-gradient(135deg,var(--accent),#6c3f3f);position:relative}
.prof-av-wrap{position:absolute;bottom:-30px;left:16px;width:60px;height:60px;border-radius:50%;border:3px solid var(--card);background:var(--surface);overflow:hidden;cursor:pointer}
.prof-av-wrap img{width:100%;height:100%;object-fit:cover}
.prof-av-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700}
.prof-info{padding:42px 16px 16px}
.prof-name{font-size:17px;font-weight:700}
.prof-un{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:2px}
.prof-bio{font-size:12px;margin-top:8px;line-height:1.5;color:var(--text)}
.prof-edit{margin-top:12px;padding:7px 18px;background:var(--surface);border:1px solid var(--border);border-radius:7px;color:var(--text);cursor:pointer;font-family:var(--font);font-size:12px;font-weight:600;transition:.15s}
.prof-edit:hover{border-color:var(--accent);color:var(--accent)}

/* ── AUTH ── */
#auth-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.auth-card{width:100%;max-width:360px;background:var(--card);border:1px solid var(--border);border-radius:18px;padding:28px 24px}
.auth-logo{display:flex;align-items:center;gap:10px;margin-bottom:22px}
.auth-tab-row{display:flex;gap:3px;margin-bottom:18px;background:var(--surface);padding:3px;border-radius:9px}
.auth-tab{flex:1;padding:7px;border:none;background:transparent;color:var(--muted);cursor:pointer;border-radius:7px;font-family:var(--font);font-size:12px;font-weight:600;transition:.15s}
.auth-tab.active{background:var(--accent);color:#fff}
.form-group{margin-bottom:12px}
.form-label{font-size:10px;font-weight:700;color:var(--muted);margin-bottom:4px;display:block;text-transform:uppercase;letter-spacing:.5px}
.form-input{width:100%;padding:9px 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font);font-size:13px;outline:none;transition:.15s}
.form-input:focus{border-color:var(--accent)}
.form-input::placeholder{color:var(--muted)}
.auth-div{text-align:center;font-size:11px;color:var(--muted);margin:12px 0;position:relative}
.auth-div::before,.auth-div::after{content:'';position:absolute;top:50%;width:43%;height:1px;background:var(--border)}
.auth-div::before{left:0}.auth-div::after{right:0}

/* ── BUTTONS ── */
.btn{padding:9px 18px;border:none;border-radius:9px;cursor:pointer;font-family:var(--font);font-size:13px;font-weight:600;transition:.15s;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover,.btn-primary:active{background:var(--accent2)}
.btn-secondary{background:var(--surface);border:1px solid var(--border);color:var(--text)}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:5px 12px;font-size:11px;border-radius:7px}
.btn-full{width:100%}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* ── MODAL ── */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:.2s;padding:16px}
.modal-ov.open{opacity:1;pointer-events:all}
.modal{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;width:100%;max-width:400px;transform:scale(.95);transition:.2s}
.modal-ov.open .modal{transform:scale(1)}
.modal-title{font-size:15px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}

/* ── TOAST ── */
#toast{position:fixed;bottom:16px;right:16px;z-index:999;display:flex;flex-direction:column;gap:6px;max-width:280px}
.toast-item{padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:9px;font-size:12px;font-weight:500;animation:toastIn .25s ease;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.toast-item.success{border-color:var(--green);color:var(--green)}
.toast-item.error{border-color:var(--accent);color:var(--accent)}
@keyframes toastIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:none}}

/* ── OVERLAY (mobile sidebar) ── */
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:40}

/* ── MOBILE ── */
@media(max-width:640px){
  #sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  #sidebar-overlay{display:block}
  #sidebar-overlay.open{pointer-events:all}
  .menu-btn{display:flex}
  .chat-msgs{padding:10px}
  #feed-view{padding:10px}
  .composer,.post-card{max-width:100%}
  #topbar{padding:0 10px}
  .topbar-right .icon-btn:not(:last-child){display:none}
}
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">AX</div>
      <div>
        <div style="font-size:16px;font-weight:700">abcxyz</div>
        <div style="font-size:10px;color:var(--muted);font-family:var(--mono)">offical-server-chat</div>
      </div>
    </div>
    <div class="auth-tab-row">
      <button class="auth-tab active" onclick="switchAuthTab('login')">Đăng nhập</button>
      <button class="auth-tab" onclick="switchAuthTab('register')">Đăng ký</button>
    </div>
    <div id="login-form">
      <div class="form-group"><label class="form-label">Tên đăng nhập</label><input class="form-input" id="l-user" type="text" placeholder="username" autocomplete="username" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <div class="form-group"><label class="form-label">Mật khẩu</label><input class="form-input" id="l-pass" type="password" placeholder="••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <button class="btn btn-primary btn-full" id="login-btn" onclick="doLogin()">Đăng nhập</button>
      <div class="auth-div">HOẶC</div>
      <div style="font-size:11px;color:var(--muted);text-align:center">Từ Mindustry: gõ <span style="font-family:var(--mono);color:var(--accent)">/webchat</span> trong game</div>
    </div>
    <div id="register-form" style="display:none">
      <div class="form-group"><label class="form-label">Tên hiển thị</label><input class="form-input" id="r-display" type="text" placeholder="Tên của bạn"></div>
      <div class="form-group"><label class="form-label">Tên đăng nhập</label><input class="form-input" id="r-user" type="text" placeholder="username"></div>
      <div class="form-group"><label class="form-label">Mật khẩu</label><input class="form-input" id="r-pass" type="password" placeholder="Tối thiểu 6 ký tự"></div>
      <button class="btn btn-primary btn-full" onclick="doRegister()">Tạo tài khoản</button>
    </div>
  </div>
</div>

<div id="sidebar-overlay" onclick="closeSidebar()"></div>

<div id="app" style="display:none">
  <div id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">AX</div>
      <div style="min-width:0">
        <div class="logo-text">abcxyz chat</div>
        <div class="logo-sub" id="online-count">0 online</div>
      </div>
    </div>
    <div class="sidebar-nav">
      <button class="nav-btn active" id="nav-feed"    onclick="switchTab('feed')">   <span class="ni">📰</span>Feed</button>
      <button class="nav-btn"        id="nav-chat"    onclick="switchTab('chat')">   <span class="ni">💬</span>Chat</button>
      <button class="nav-btn"        id="nav-profile" onclick="switchTab('profile')"><span class="ni">👤</span>Tôi</button>
    </div>
    <!-- search chỉ hiện khi tab chat -->
    <div class="sidebar-search" id="s-search-wrap" style="display:none">
      <input class="search-in" id="s-search" placeholder="Tìm người dùng..." oninput="onSearch(this.value)">
    </div>
    <div class="sidebar-list" id="sidebar-list"></div>
  </div>

  <div id="main">
    <div id="topbar">
      <div class="topbar-left">
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
        <div class="topbar-av" id="tb-av">?</div>
        <div class="topbar-info">
          <div class="topbar-title" id="tb-title">Feed</div>
          <div class="topbar-sub"  id="tb-sub">Bài đăng mới nhất</div>
        </div>
      </div>
      <div class="topbar-right">
        <button class="icon-btn" title="Profile" onclick="switchTab('profile')">⚙️</button>
      </div>
    </div>

    <div id="content">

      <!-- ═══ FEED ═══ -->
      <div id="feed-view">
        <div class="composer">
          <div class="comp-row">
            <div class="s-av" id="comp-av" style="width:38px;height:38px">?</div>
            <textarea class="comp-in" id="post-in" placeholder="Bạn đang nghĩ gì?" onkeydown="if(event.ctrlKey&&event.key==='Enter')submitPost()"></textarea>
          </div>
          <div class="comp-actions">
            <button class="btn btn-secondary btn-sm" onclick="addImg()">🖼</button>
            <button class="btn btn-primary btn-sm"   onclick="submitPost()">Đăng</button>
          </div>
          <div id="post-preview" style="display:none;margin-top:8px"></div>
        </div>
        <div id="posts-list" style="width:100%;max-width:560px;display:flex;flex-direction:column;gap:12px"></div>
        <div style="height:32px"></div>
      </div>

      <!-- ═══ CHAT (DM + Global — 1 view duy nhất) ═══ -->
      <div id="chat-view" style="display:none;flex:1;flex-direction:column">
        <div class="chat-msgs" id="chat-msgs">
          <div style="text-align:center;color:var(--muted);padding:30px;font-size:13px">
            Chọn phòng chat từ danh sách bên trái
          </div>
        </div>
        <!-- Input area — nút send đổi màu theo loại room -->
        <div class="chat-input-area">
          <textarea class="chat-in" id="chat-in"
            placeholder="Nhắn tin..."
            rows="1"
            onkeydown="chatKey(event)"
            oninput="autoH(this)"></textarea>
          <button class="send-btn" id="send-btn" onclick="sendMsg()">➤</button>
        </div>
      </div>

      <!-- ═══ PROFILE ═══ -->
      <div id="profile-view" style="display:none;overflow-y:auto;padding:14px">
        <div class="prof-hdr">
          <div class="prof-cover" id="prof-cover"></div>
          <div style="position:relative">
            <div class="prof-av-wrap" onclick="changeAv()">
              <div class="prof-av-ph" id="my-av">?</div>
            </div>
          </div>
          <div class="prof-info">
            <div class="prof-name" id="prof-name">...</div>
            <div class="prof-un"   id="prof-un">@...</div>
            <div class="prof-bio"  id="prof-bio"></div>
            <button class="prof-edit" onclick="openEditProf()">✏️ Chỉnh sửa</button>
          </div>
        </div>
        <div id="prof-posts" style="display:flex;flex-direction:column;gap:12px;max-width:560px;margin:0 auto"></div>
      </div>

    </div><!-- /content -->
  </div><!-- /main -->
</div><!-- /app -->

<!-- MODALS -->
<div class="modal-ov" id="edit-modal">
  <div class="modal">
    <div class="modal-title">Chỉnh sửa hồ sơ <button class="icon-btn" onclick="closeModal('edit-modal')">✕</button></div>
    <div class="form-group"><label class="form-label">Tên hiển thị</label><input class="form-input" id="e-display"></div>
    <div class="form-group"><label class="form-label">Giới thiệu</label><textarea class="form-input" id="e-bio" rows="3" style="resize:vertical"></textarea></div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-secondary" onclick="closeModal('edit-modal')">Hủy</button>
      <button class="btn btn-primary"   onclick="saveProf()">Lưu</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ══════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════
let token = localStorage.getItem('ax_token') || '';
let me = null, socket = null;
let curRoom = null;          // null = chưa chọn room nào
let curRoomIsGlobal = false; // true khi đang ở #Global
let curTab = 'feed';
let postImgB64 = '';
const API = '';

// ══════════════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════════════
const $ = id => document.getElementById(id);
function toast(msg, type='success'){
  const el = document.createElement('div');
  el.className = 'toast-item ' + type;
  el.textContent = msg;
  $('toast').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
function timeAgo(d){
  const s = (Date.now() - new Date(d)) / 1000;
  if(s<60) return 'vừa xong';
  if(s<3600) return ~~(s/60)+'ph';
  if(s<86400) return ~~(s/3600)+'g';
  return ~~(s/86400)+'ng';
}
function avBg(u){
  const c=['#e8504a','#4a9eff','#2ed573','#f5c842','#9b59b6','#e17055'];
  const n = u?.displayName || u?.username || '?';
  return c[n.charCodeAt(0) % c.length];
}
async function api(method, path, body){
  const o = {method, headers:{'Content-Type':'application/json'}};
  if(token) o.headers['Authorization'] = 'Bearer ' + token;
  if(body)  o.body = JSON.stringify(body);
  const r = await fetch(API + path, o);
  return r.json();
}
function autoH(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,100)+'px' }
function chatKey(e){
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendMsg(); }
}

// ══════════════════════════════════════════════════════
//  SIDEBAR MOBILE
// ══════════════════════════════════════════════════════
function toggleSidebar(){ $('sidebar').classList.toggle('open'); $('sidebar-overlay').classList.toggle('open'); }
function closeSidebar(){  $('sidebar').classList.remove('open'); $('sidebar-overlay').classList.remove('open'); }

// ══════════════════════════════════════════════════════
//  AUTH
// ══════════════════════════════════════════════════════
function switchAuthTab(t){
  $('login-form').style.display    = t==='login'    ? 'block' : 'none';
  $('register-form').style.display = t==='register' ? 'block' : 'none';
  document.querySelectorAll('.auth-tab').forEach((b,i) =>
    b.classList.toggle('active', (i===0&&t==='login')||(i===1&&t==='register')));
}
async function doLogin(){
  const btn = $('login-btn'); btn.disabled=true; btn.textContent='...';
  try{
    const r = await api('POST','/api/auth/login',{username:$('l-user').value.trim(), password:$('l-pass').value});
    if(r.error){ toast(r.error,'error'); return; }
    token = r.token; localStorage.setItem('ax_token',token); me = r.user; startApp();
  }catch{ toast('Lỗi kết nối','error'); }
  finally{ btn.disabled=false; btn.textContent='Đăng nhập'; }
}
async function doRegister(){
  try{
    const r = await api('POST','/api/auth/register',{username:$('r-user').value.trim(), password:$('r-pass').value, displayName:$('r-display').value.trim()});
    if(r.error){ toast(r.error,'error'); return; }
    token = r.token; localStorage.setItem('ax_token',token); me = r.user; startApp();
  }catch{ toast('Lỗi kết nối','error'); }
}
async function autoLogin(){
  // UUID login từ query param (từ Mindustry /webchat)
  const uuid = new URLSearchParams(location.search).get('uuid');
  if(uuid){
    const r = await api('POST','/api/auth/uuid',{uuid});
    if(!r.error){ token=r.token; localStorage.setItem('ax_token',token); me=r.user; startApp(); return; }
  }
  if(token){
    try{
      const r = await api('GET','/api/auth/me');
      if(r._id){ me=r; startApp(); return; }
    }catch{}
    token=''; localStorage.removeItem('ax_token');
  }
  $('auth-screen').style.display='flex';
}

// ══════════════════════════════════════════════════════
//  APP START
// ══════════════════════════════════════════════════════
function startApp(){
  $('auth-screen').style.display='none';
  $('app').style.display='flex';
  initSocket();
  loadFeed();
  updateMyUI();
  buildSidebarChat(); // xây sidebar chat với Global + search
  setInterval(loadOnlineCount, 15000);
  loadOnlineCount();
}
function updateMyUI(){
  if(!me) return;
  const name = me.displayName || me.username;
  $('prof-name').textContent = name;
  $('prof-un').textContent   = '@'+me.username;
  $('prof-bio').textContent  = me.bio || '';
  const avEl = $('my-av');
  if(me.avatar){ avEl.innerHTML=`<img src="${me.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`; }
  else{ avEl.textContent=name[0].toUpperCase(); document.querySelector('.prof-av-wrap').style.background=avBg(me); }
  const tb = $('tb-av');
  if(me.avatar) tb.innerHTML=`<img src="${me.avatar}" style="width:34px;height:34px;object-fit:cover;border-radius:50%">`;
  else{ tb.textContent=name[0].toUpperCase(); tb.style.background=avBg(me); }
  const ca = $('comp-av'); ca.style.background=avBg(me);
  ca.innerHTML = me.avatar
    ? `<img src="${me.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`
    : `<span style="font-size:13px;font-weight:700">${name[0].toUpperCase()}</span>`;
}

// ══════════════════════════════════════════════════════
//  SOCKET
// ══════════════════════════════════════════════════════
function initSocket(){
  socket = io();
  socket.emit('auth', token);
  socket.emit('join_room','global');

  socket.on('new_message', msg => {
    // Chỉ render nếu đang ở đúng room
    if(msg.roomId === curRoom){
      appendMessage(msg, $('chat-msgs'));
    }
  });

  socket.on('new_post', post => { if(curTab==='feed') prependPost(post); });

  socket.on('post_liked', ({postId,likes}) => {
    const b = document.querySelector(`[data-like="${postId}"]`);
    if(b) b.innerHTML=`❤️ ${likes}`;
  });
  socket.on('post_commented', ({postId,comment}) => {
    const sec = document.querySelector(`[data-cmt="${postId}"]`);
    if(sec) sec.insertBefore(buildCmt(comment), sec.querySelector('.cmt-in-row'));
  });
  socket.on('post_deleted', ({postId}) => document.querySelector(`[data-post="${postId}"]`)?.remove());
  socket.on('user_online',  () => loadOnlineCount());
  socket.on('user_offline', () => loadOnlineCount());
}

// ══════════════════════════════════════════════════════
//  TAB SWITCHING
// ══════════════════════════════════════════════════════
function switchTab(tab){
  curTab = tab;
  // Ẩn tất cả views
  ['feed','chat','profile'].forEach(t => {
    const v = $(t+'-view'), n = $('nav-'+t);
    if(v) v.style.display = 'none';
    if(n) n.classList.toggle('active', t===tab);
  });
  // Hiện view tương ứng
  if(tab==='feed')    { $('feed-view').style.display='flex'; }
  if(tab==='chat')    { $('chat-view').style.display='flex'; }
  if(tab==='profile') { $('profile-view').style.display='block'; loadMyProfile(); }

  // Sidebar search chỉ hiện khi chat
  $('s-search-wrap').style.display = tab==='chat' ? 'block' : 'none';

  // Topbar title
  const titles = {feed:'Feed', chat:'Messages', profile:'Profile'};
  const subs   = {feed:'Bài đăng mới nhất', chat:'Chọn phòng để bắt đầu', profile:'Hồ sơ cá nhân'};
  $('tb-title').textContent = curRoomIsGlobal && tab==='chat' ? '🎮 Global Chat' : titles[tab];
  $('tb-sub').textContent   = curRoomIsGlobal && tab==='chat' ? 'Kết nối với Mindustry' : subs[tab];

  if(window.innerWidth<=640) closeSidebar();
}

// ══════════════════════════════════════════════════════
//  SIDEBAR CHAT — Global + DM list
// ══════════════════════════════════════════════════════
function buildSidebarChat(){
  const list = $('sidebar-list');
  list.innerHTML = '';

  // Global room
  const globalEl = buildRoomItem({
    id:'global', name:'🌐 #Global', sub:'Chat + Mindustry game server', icon:'🌐'
  });
  globalEl.dataset.room = 'global';
  globalEl.onclick = () => { switchTab('chat'); openRoom('global','🎮 Global Chat','Kết nối với Mindustry',true); };
  list.appendChild(globalEl);
}

function buildRoomItem({id,name,sub,icon,av}){
  const el = document.createElement('div');
  el.className='s-item'; el.dataset.room=id;
  el.innerHTML=`
    <div class="s-av" style="background:var(--blue)">
      ${av ? `<img src="${av}">` : `<span style="font-size:13px">${icon||name[0]}</span>`}
    </div>
    <div class="s-info">
      <div class="s-name">${esc(name)}</div>
      <div class="s-sub">${esc(sub||'')}</div>
    </div>`;
  return el;
}

// ══════════════════════════════════════════════════════
//  OPEN ROOM
// ══════════════════════════════════════════════════════
async function openRoom(roomId, title, subtitle, isGlobal=false){
  curRoom = roomId;
  curRoomIsGlobal = isGlobal;

  socket?.emit('join_room', roomId);

  // Highlight sidebar item
  document.querySelectorAll('.s-item').forEach(el =>
    el.classList.toggle('active', el.dataset.room===roomId));

  // Cập nhật topbar
  $('tb-title').textContent = title;
  $('tb-sub').textContent   = subtitle || '';

  // Đổi màu nút send: xanh = global, đỏ = DM
  const sendBtn = $('send-btn');
  if(isGlobal){
    sendBtn.classList.add('global');
    $('chat-in').placeholder = '💬 Nhắn tin tới Global & Mindustry...';
  } else {
    sendBtn.classList.remove('global');
    $('chat-in').placeholder = 'Nhắn tin...';
  }

  // Load messages
  const msgs = $('chat-msgs');
  msgs.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:12px;padding:20px">Đang tải...</div>';

  const r = await api('GET', `/api/messages/${roomId}?limit=50`);
  msgs.innerHTML = '';

  // Banner nếu là Global
  if(isGlobal){
    const banner = document.createElement('div');
    banner.className = 'global-banner';
    banner.textContent = '🎮 Global Chat — kết nối với người chơi Mindustry & web app';
    msgs.appendChild(banner);
  }

  if(Array.isArray(r)) r.forEach(m => appendMessage(m, msgs));
  msgs.scrollTop = msgs.scrollHeight;

  if(window.innerWidth<=640) closeSidebar();
}

// ══════════════════════════════════════════════════════
//  APPEND MESSAGE
// ══════════════════════════════════════════════════════
function appendMessage(msg, container){
  if(!container) return;
  const isOwn  = msg.senderId === me?._id;
  const isGame = msg.fromGame;
  const displayText = msg.displayContent || msg.content || '';

  const row = document.createElement('div');
  row.className = 'msg-row' + (isOwn?' own':'') + (isGame?' game':'');

  // Avatar
  const av = document.createElement('div');
  av.className = 'msg-av';
  av.style.background = avBg({displayName:msg.senderName});
  if(msg.senderAvatar) av.innerHTML=`<img src="${msg.senderAvatar}">`;
  else av.textContent = (msg.senderName||'?')[0].toUpperCase();

  // Group
  const group = document.createElement('div');
  group.className = 'msg-group';

  // Sender name (chỉ hiện với tin của người khác)
  if(!isOwn){
    const sn = document.createElement('div');
    sn.className = 'msg-sender';
    sn.textContent = (msg.senderName||'?') + (isGame?' 🎮':'');
    group.appendChild(sn);
  }

  // Bubble — dùng textContent để tránh bug chia ký tự
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = displayText;

  // Meta
  const meta = document.createElement('div');
  meta.className = 'msg-meta';
  meta.textContent = timeAgo(msg.createdAt || new Date());
  if(isGame){
    const tag = document.createElement('span');
    tag.className='game-tag'; tag.textContent='GAME';
    meta.appendChild(tag);
  }
  if(msg.isTranslated){
    const hint = document.createElement('span');
    hint.className='trans-hint'; hint.textContent='(đã dịch)';
    meta.appendChild(hint);
  }

  group.appendChild(bubble);
  group.appendChild(meta);

  if(isOwn){ row.appendChild(group); }
  else      { row.appendChild(av); row.appendChild(group); }

  container.appendChild(row);
  container.scrollTop = container.scrollHeight;
}

// ══════════════════════════════════════════════════════
//  SEND MESSAGE (1 hàm duy nhất cho cả DM và Global)
// ══════════════════════════════════════════════════════
function sendMsg(){
  const inp = $('chat-in');
  const content = inp.value.trim();
  if(!content || !curRoom){
    if(!curRoom) toast('Chọn phòng chat trước!','error');
    return;
  }
  socket?.emit('send_message', {roomId: curRoom, content, token});
  inp.value = '';
  inp.style.height = 'auto';
}

// ══════════════════════════════════════════════════════
//  FEED
// ══════════════════════════════════════════════════════
async function loadFeed(){
  const r = await api('GET','/api/posts?page=1');
  if(!Array.isArray(r)) return;
  const list = $('posts-list'); list.innerHTML='';
  r.forEach(p => list.appendChild(buildPost(p)));
}
function buildPost(post){
  const div = document.createElement('div');
  div.className='post-card'; div.dataset.post=post._id;
  const liked = post.likes?.includes(me?._id);
  const gb    = post.fromGame ? '<span class="game-badge">GAME</span>' : '';
  const displayContent = post.displayContent || post.content;
  const transBadge = post.isTranslated
    ? `<span style="font-size:9px;color:var(--muted);font-style:italic"> (đã dịch)</span>` : '';
  div.innerHTML=`
    <div class="post-hdr">
      <div class="s-av" style="background:${avBg({displayName:post.authorName})}">
        ${post.authorAvatar
          ? `<img src="${post.authorAvatar}">`
          : `<span style="font-size:12px;font-weight:700">${(post.authorName||'?')[0].toUpperCase()}</span>`}
      </div>
      <div>
        <div class="post-author">${esc(post.authorName||'?')}${gb}${transBadge}</div>
        <div style="font-size:10px;color:var(--muted)">${timeAgo(post.createdAt)}</div>
      </div>
      ${post.authorId===me?._id
        ? `<button class="icon-btn" style="margin-left:auto;width:28px;height:28px" onclick="delPost('${post._id}')">🗑</button>` : ''}
    </div>
    <div class="post-body">${esc(displayContent)}</div>
    ${post.image ? `<img class="post-img" src="${post.image}" loading="lazy">` : ''}
    <div class="post-actions">
      <button class="act-btn ${liked?'liked':''}" data-like="${post._id}" onclick="likePost('${post._id}',this)">❤️ ${post.likes?.length||0}</button>
      <button class="act-btn" onclick="toggleCmt('${post._id}')">💬 ${post.comments?.length||0}</button>
    </div>
    <div class="comments-sec" id="cmt-${post._id}" data-cmt="${post._id}" style="display:none">
      ${(post.comments||[]).map(c=>buildCmt(c).outerHTML).join('')}
      <div class="cmt-in-row">
        <input class="cmt-in" placeholder="Bình luận..." onkeydown="if(event.key==='Enter')submitCmt('${post._id}',this)">
        <button class="btn btn-primary btn-sm" onclick="submitCmt('${post._id}',this.previousElementSibling)">Gửi</button>
      </div>
    </div>`;
  return div;
}
function buildCmt(c){
  const div=document.createElement('div'); div.className='cmt-item';
  const display=c.displayContent||c.content||'';
  div.innerHTML=`
    <div class="s-av" style="width:26px;height:26px;font-size:10px;background:${avBg({displayName:c.authorName})}">
      ${c.authorAvatar?`<img src="${c.authorAvatar}">`:`<span>${(c.authorName||'?')[0].toUpperCase()}</span>`}
    </div>
    <div><div class="cmt-author">${esc(c.authorName||'?')}</div><div class="cmt-text">${esc(display)}</div></div>`;
  return div;
}
function prependPost(post){
  const list=$('posts-list');
  list.insertBefore(buildPost(post), list.firstChild);
}
async function submitPost(){
  const content=$('post-in').value.trim();
  if(!content){toast('Nhập nội dung','error');return;}
  const r=await api('POST','/api/posts',{content,image:postImgB64});
  if(r.error){toast(r.error,'error');return;}
  $('post-in').value=''; postImgB64='';
  $('post-preview').style.display='none';
  toast('Đã đăng!'); prependPost(r);
}
function addImg(){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*';
  inp.onchange=e=>{
    const reader=new FileReader();
    reader.onload=ev=>{
      postImgB64=ev.target.result;
      const prev=$('post-preview'); prev.style.display='block';
      prev.innerHTML=`<img src="${postImgB64}" style="max-height:120px;border-radius:7px">`;
    };
    reader.readAsDataURL(e.target.files[0]);
  };
  inp.click();
}
async function likePost(id,btn){
  const r=await api('POST',`/api/posts/${id}/like`);
  if(!r.error){btn.innerHTML=`❤️ ${r.likes}`;btn.classList.toggle('liked',r.liked);}
}
function toggleCmt(id){
  const s=$(`cmt-${id}`);
  if(s) s.style.display=s.style.display==='none'?'block':'none';
}
async function submitCmt(postId,inp){
  if(!inp.value.trim())return;
  const r=await api('POST',`/api/posts/${postId}/comment`,{content:inp.value.trim()});
  if(r.error){toast(r.error,'error');return;}
  inp.value='';
}
async function delPost(id){
  if(!confirm('Xóa bài?'))return;
  const r=await api('DELETE',`/api/posts/${id}`);
  if(r.success){document.querySelector(`[data-post="${id}"]`)?.remove();toast('Đã xóa');}
}

// ══════════════════════════════════════════════════════
//  SEARCH người dùng (DM)
// ══════════════════════════════════════════════════════
async function onSearch(q){
  const list=$('sidebar-list');
  if(!q.trim()){ buildSidebarChat(); return; }
  const r=await api('GET',`/api/users/search?q=${encodeURIComponent(q)}`);
  list.innerHTML='';
  if(!Array.isArray(r)) return;
  // Luôn giữ Global ở đầu
  const globalEl=buildRoomItem({id:'global',name:'🌐 #Global',sub:'Chat + Mindustry',icon:'🌐'});
  globalEl.onclick=()=>{ switchTab('chat'); openRoom('global','🎮 Global Chat','Kết nối với Mindustry',true); };
  list.appendChild(globalEl);

  r.filter(u=>u._id!==me?._id).forEach(u=>{
    const el=buildRoomItem({id:u._id, name:u.displayName||u.username, sub:'@'+u.username, av:u.avatar});
    el.onclick=()=>{
      switchTab('chat');
      openRoom([me._id,u._id].sort().join('_'), u.displayName||u.username, '@'+u.username, false);
    };
    list.appendChild(el);
  });
}

// ══════════════════════════════════════════════════════
//  PROFILE
// ══════════════════════════════════════════════════════
async function loadMyProfile(){
  const r=await api('GET',`/api/profile/${me._id}`);
  if(r.user){me={...me,...r.user};updateMyUI();}
  const pp=$('prof-posts'); pp.innerHTML='';
  (r.posts||[]).forEach(p=>pp.appendChild(buildPost(p)));
}
function openEditProf(){
  $('e-display').value=me.displayName||'';
  $('e-bio').value=me.bio||'';
  $('edit-modal').classList.add('open');
}
async function saveProf(){
  const r=await api('PUT','/api/profile',{displayName:$('e-display').value.trim(),bio:$('e-bio').value.trim()});
  if(r.error){toast(r.error,'error');return;}
  me={...me,...r};updateMyUI();closeModal('edit-modal');toast('Đã lưu!');
}
function changeAv(){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*';
  inp.onchange=e=>{
    const reader=new FileReader();
    reader.onload=async ev=>{
      const r=await api('PUT','/api/profile',{avatar:ev.target.result});
      if(r.error){toast(r.error,'error');return;}
      me.avatar=ev.target.result;updateMyUI();toast('Đã đổi ảnh!');
    };
    reader.readAsDataURL(e.target.files[0]);
  };
  inp.click();
}

// ══════════════════════════════════════════════════════
//  ONLINE COUNT
// ══════════════════════════════════════════════════════
async function loadOnlineCount(){
  const r=await api('GET','/api/game/online');
  $('online-count').textContent=(r.count||0)+' online';
}

// ══════════════════════════════════════════════════════
