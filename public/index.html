<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>abcxyz official app server — Mindustry Social</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --bg-deep: #0a0c12;
    --glass-bg: rgba(18, 22, 32, 0.68);
    --glass-bg-solid: rgba(18, 22, 32, 0.92);
    --glass-border: rgba(255, 255, 255, 0.06);
    --glass-border-light: rgba(255, 255, 255, 0.12);
    --accent: #ff4d4d;
    --accent-glow: #ff6b6b;
    --accent-soft: #ff7b72;
    --gold: #ffcd4a;
    --green: #2ecc71;
    --blue: #4a9eff;
    --text-primary: #f0f3fa;
    --text-secondary: #9aa2b5;
    --text-muted: #5f6a84;
    --radius-card: 24px;
    --radius-element: 14px;
    --shadow-glass: 0 12px 32px rgba(0, 0, 0, 0.25);
    --backdrop-blur: blur(14px);
    --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  body {
    background: radial-gradient(circle at 10% 20%, #121624, #05070a);
    color: var(--text-primary);
    font-family: var(--font-sans);
    height: 100vh;
    overflow: hidden;
  }

  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }

  /* App Layout */
  .app-container {
    display: flex;
    height: 100vh;
    width: 100%;
    overflow: hidden;
  }

  /* Sidebar - Glass Style */
  .glass-sidebar {
    width: 280px;
    background: var(--glass-bg);
    backdrop-filter: var(--backdrop-blur);
    border-right: 1px solid var(--glass-border);
    display: flex;
    flex-direction: column;
    transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    z-index: 20;
    flex-shrink: 0;
    overflow-y: auto;
  }

  @media (max-width: 700px) {
    .glass-sidebar {
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      transform: translateX(-100%);
      width: 280px;
      z-index: 100;
      background: rgba(10, 12, 18, 0.96);
      backdrop-filter: blur(20px);
    }
    .glass-sidebar.mobile-open {
      transform: translateX(0);
    }
    .sidebar-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      z-index: 90;
      display: none;
    }
    .sidebar-backdrop.active { display: block; }
  }

  /* Sidebar Content */
  .logo-area {
    padding: 24px 20px 16px;
    border-bottom: 1px solid var(--glass-border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-icon {
    width: 42px;
    height: 42px;
    background: linear-gradient(135deg, var(--accent), #ff8a5c);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 20px;
  }
  .logo-text h2 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .logo-text p {
    font-size: 10px;
    color: var(--text-secondary);
    font-family: var(--font-mono);
  }

  .nav-tabs {
    display: flex;
    gap: 6px;
    padding: 16px 12px;
    border-bottom: 1px solid var(--glass-border);
    flex-wrap: wrap;
  }
  .nav-btn {
    flex: 1;
    background: rgba(255,255,255,0.02);
    border: 1px solid transparent;
    padding: 10px 0;
    border-radius: 18px;
    font-family: var(--font-sans);
    font-weight: 500;
    font-size: 13px;
    color: var(--text-secondary);
    transition: all 0.2s;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .nav-btn.active {
    background: var(--accent);
    color: white;
    box-shadow: 0 4px 12px rgba(255, 77, 77, 0.3);
  }

  .search-area { padding: 12px; }
  .glass-input {
    width: 100%;
    background: rgba(10, 12, 18, 0.7);
    border: 1px solid var(--glass-border);
    border-radius: 30px;
    padding: 10px 16px;
    color: white;
    font-size: 13px;
    outline: none;
  }
  .glass-input:focus { border-color: var(--accent); }

  .sidebar-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .chat-room-item {
    padding: 12px;
    border-radius: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: 0.15s;
  }
  .chat-room-item:hover, .chat-room-item.active {
    background: rgba(255, 255, 255, 0.05);
  }
  .room-avatar {
    width: 44px;
    height: 44px;
    background: rgba(255,255,255,0.08);
    border-radius: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .room-info { flex: 1; }
  .room-name { font-weight: 600; font-size: 14px; }
  .room-sub { font-size: 11px; color: var(--text-muted); }

  .game-online-panel {
    margin-top: auto;
    padding: 12px;
    background: rgba(0,0,0,0.3);
    border-top: 1px solid var(--glass-border);
  }

  /* Main Panel */
  .main-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  .top-bar {
    padding: 14px 20px;
    background: var(--glass-bg-solid);
    backdrop-filter: var(--backdrop-blur);
    border-bottom: 1px solid var(--glass-border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .menu-toggle {
    display: none;
    background: none;
    border: none;
    font-size: 24px;
    color: white;
    cursor: pointer;
    margin-right: 12px;
  }
  @media (max-width: 700px) { .menu-toggle { display: block; } }
  .top-title { font-weight: 700; font-size: 18px; }
  .top-sub { font-size: 11px; color: var(--text-secondary); }

  /* Views */
  .view {
    flex: 1;
    overflow-y: auto;
    padding: 16px 12px;
    display: flex;
    flex-direction: column;
  }

  /* Glass Cards */
  .glass-card {
    background: var(--glass-bg);
    backdrop-filter: var(--backdrop-blur);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-card);
    overflow: hidden;
  }
  .post-composer { padding: 16px; }
  .composer-area { display: flex; gap: 12px; align-items: flex-start; }
  .composer-input {
    flex: 1;
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    padding: 12px 16px;
    color: white;
    font-family: var(--font-sans);
    resize: none;
    font-size: 14px;
  }
  .post-actions-bar {
    display: flex;
    justify-content: flex-end;
    margin-top: 12px;
    gap: 8px;
  }
  .btn-glass {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--glass-border);
    padding: 6px 16px;
    border-radius: 40px;
    color: white;
    font-weight: 500;
    font-size: 12px;
    cursor: pointer;
  }
  .btn-accent { background: var(--accent); border: none; }

  /* CHAT MESSAGES - FIXED: no more broken words */
  .chat-messages-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 16px;
    flex: 1;
    overflow-y: auto;
  }
  .message-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    max-width: 100%;
  }
  .message-row.own { flex-direction: row-reverse; }
  .msg-avatar {
    width: 36px;
    height: 36px;
    background: rgba(255,255,255,0.1);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-weight: 600;
  }
  .msg-content-wrapper {
    max-width: 78%;
    display: flex;
    flex-direction: column;
  }
  .msg-sender {
    font-size: 11px;
    font-weight: 600;
    margin-bottom: 4px;
    color: var(--accent-soft);
  }
  .msg-bubble {
    background: rgba(30, 34, 48, 0.8);
    backdrop-filter: blur(8px);
    padding: 10px 14px;
    border-radius: 20px;
    font-size: 14px;
    line-height: 1.45;
    word-break: break-word;
    white-space: normal;
    display: inline-block;
    width: fit-content;
    max-width: 100%;
    border: 1px solid rgba(255,255,255,0.05);
  }
  .message-row.own .msg-bubble {
    background: var(--accent);
    color: white;
    border-bottom-right-radius: 4px;
  }
  .message-row:not(.own) .msg-bubble {
    border-bottom-left-radius: 4px;
  }
  .msg-time {
    font-size: 9px;
    color: var(--text-muted);
    margin-top: 4px;
    margin-left: 8px;
  }

  .chat-input-container {
    background: var(--glass-bg-solid);
    backdrop-filter: var(--backdrop-blur);
    border-top: 1px solid var(--glass-border);
    padding: 12px 16px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  .chat-textarea {
    flex: 1;
    background: rgba(0,0,0,0.5);
    border: 1px solid var(--glass-border);
    border-radius: 28px;
    padding: 10px 18px;
    color: white;
    font-family: var(--font-sans);
    font-size: 14px;
    resize: none;
    max-height: 100px;
  }

  .empty-chat {
    text-align: center;
    color: var(--text-muted);
    padding: 40px;
  }

  @media (max-width: 550px) {
    .msg-content-wrapper { max-width: 85%; }
  }
</style>
</head>
<body>

<div class="app-container">
  <div class="sidebar-backdrop" id="sidebarBackdrop" onclick="closeMobileSidebar()"></div>
  <div class="glass-sidebar" id="mobileSidebar">
    <div class="logo-area">
      <div class="logo-icon">✨</div>
      <div class="logo-text">
        <h2>abcxyz</h2>
        <p>official app server</p>
      </div>
    </div>
    <div class="nav-tabs">
      <button class="nav-btn active" data-tab="feed"><span>📰</span> Feed</button>
      <button class="nav-btn" data-tab="chat"><span>💬</span> Chat</button>
      <button class="nav-btn" data-tab="game"><span>🎮</span> Game</button>
      <button class="nav-btn" data-tab="profile"><span>👤</span> Profile</button>
    </div>
    <div class="search-area">
      <input type="text" class="glass-input" id="sidebar-search" placeholder="🔍 Tìm kiếm người dùng...">
    </div>
    <div class="sidebar-list" id="sidebar-list"></div>
    <div class="game-online-panel" id="game-online-panel">
      <div style="font-size:10px; text-transform:uppercase; margin-bottom:6px;">🎮 Đang chơi Mindustry</div>
      <div id="game-online-list" style="display: flex; flex-wrap: wrap; gap: 8px;"></div>
    </div>
  </div>

  <div class="main-panel">
    <div class="top-bar">
      <div style="display: flex; align-items: center;">
        <button class="menu-toggle" id="menuToggleBtn">☰</button>
        <div>
          <div class="top-title" id="topbar-title">abcxyz Feed</div>
          <div class="top-sub" id="topbar-sub">Cộng đồng Mindustry</div>
        </div>
      </div>
      <div><span id="online-count" style="background: rgba(46,204,113,0.2); padding: 4px 10px; border-radius: 30px; font-size: 12px;">● 0 online</span></div>
    </div>

    <!-- FEED VIEW -->
    <div id="feed-view" class="view" style="display: flex;">
      <div style="max-width: 620px; margin: 0 auto; width: 100%;">
        <div class="glass-card post-composer">
          <div class="composer-area">
            <div class="room-avatar" style="width:40px; height:40px;" id="composer-avatar">👤</div>
            <textarea id="post-input" rows="2" class="composer-input" placeholder="Bạn đang nghĩ gì về Mindustry?"></textarea>
          </div>
          <div class="post-actions-bar">
            <button class="btn-glass" id="attachImageBtn">🖼 Ảnh</button>
            <button class="btn-glass btn-accent" id="submitPostBtn">Đăng bài</button>
          </div>
          <div id="post-preview" style="display: none; margin-top: 8px;"></div>
        </div>
        <div id="posts-list" style="display: flex; flex-direction: column; gap: 16px;"></div>
      </div>
    </div>

    <!-- CHAT VIEW -->
    <div id="chat-view" class="view" style="display: none; flex-direction: column; padding: 0;">
      <div id="chat-messages" class="chat-messages-list"></div>
      <div class="chat-input-container">
        <textarea id="chat-input" class="chat-textarea" rows="1" placeholder="Nhập tin nhắn..."></textarea>
        <button id="sendChatBtn" class="btn-glass btn-accent" style="padding: 8px 18px;">Gửi</button>
      </div>
    </div>

    <!-- GAME VIEW -->
    <div id="game-view" class="view" style="display: none; flex-direction: column; padding: 0;">
      <div id="game-messages" class="chat-messages-list"></div>
      <div class="chat-input-container">
        <textarea id="game-input" class="chat-textarea" rows="1" placeholder="Nhắn tin tới Mindustry..."></textarea>
        <button id="sendGameBtn" class="btn-glass btn-accent" style="background: #ff884d;">🎮 Gửi</button>
      </div>
    </div>

    <!-- PROFILE VIEW -->
    <div id="profile-view" class="view" style="display: none;">
      <div class="glass-card" style="padding: 24px;">
        <div style="display: flex; gap: 20px; align-items: center; flex-wrap: wrap;">
          <div id="profile-avatar" style="width: 72px; height: 72px; background: var(--accent); border-radius: 60px; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: bold;">?</div>
          <div>
            <h2 id="profile-name">...</h2>
            <div id="profile-username">@username</div>
            <div id="profile-bio" style="margin-top: 6px; color: var(--text-secondary);"></div>
            <button id="editProfileBtn" class="btn-glass" style="margin-top: 12px;">✏️ Chỉnh sửa</button>
          </div>
        </div>
        <div style="margin-top: 24px;"><strong>Bài viết của bạn</strong></div>
        <div id="profile-posts" style="margin-top: 16px; display: flex; flex-direction: column; gap: 14px;"></div>
      </div>
    </div>
  </div>
</div>

<!-- Edit Profile Modal -->
<div id="edit-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); backdrop-filter:blur(8px); z-index:200; align-items:center; justify-content:center;">
  <div style="background:var(--glass-bg-solid); border-radius:28px; padding:24px; width:90%; max-width:400px; border:1px solid var(--glass-border);">
    <h3 style="margin-bottom:16px;">Chỉnh sửa hồ sơ</h3>
    <input id="edit-display" class="glass-input" placeholder="Tên hiển thị" style="margin-bottom:12px;">
    <textarea id="edit-bio" class="glass-input" placeholder="Giới thiệu" rows="3" style="margin-bottom:16px;"></textarea>
    <div style="display:flex; gap:12px; justify-content:flex-end;">
      <button class="btn-glass" onclick="closeEditModal()">Hủy</button>
      <button class="btn-glass btn-accent" id="saveProfileBtn">Lưu</button>
    </div>
  </div>
</div>

<div id="toast" style="position:fixed; bottom:20px; right:20px; z-index:999; display:flex; flex-direction:column; gap:8px;"></div>

<script>
  // ==================== BACKEND THẬT - GIỮ NGUYÊN ====================
  let token = localStorage.getItem('cc_token') || '';
  let me = null;
  let socket = null;
  let curRoom = 'global';
  let curTab = 'feed';
  let postImageB64 = '';

  const API = '';  // same origin - kết nối đến backend thật của bạn

  function toast(msg, type = 'success') {
    const el = document.createElement('div');
    el.className = 'toast-item';
    el.style.cssText = `background:var(--glass-bg-solid); border:1px solid var(--glass-border); padding:10px 16px; border-radius:12px; font-size:13px; color:${type === 'error' ? 'var(--accent)' : 'var(--green)'}`;
    el.textContent = msg;
    document.getElementById('toast').appendChild(el);
    setTimeout(() => el.remove(), 3500);
  }

  async function api(method, path, body) {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (token) opts.headers['Authorization'] = 'Bearer ' + token;
    if (body) opts.body = JSON.stringify(body);
    const r = await fetch(API + path, opts);
    return r.json();
  }

  function avatarBg(user) {
    const colors = ['#ff4d4d', '#4a9eff', '#2ecc71', '#ffcd4a', '#9b59b6'];
    const name = user?.displayName || user?.username || '?';
    return colors[name.charCodeAt(0) % colors.length];
  }

  function timeAgo(d) {
    const s = (Date.now() - new Date(d).getTime()) / 1000;
    if (s < 60) return 'vừa xong';
    if (s < 3600) return Math.floor(s / 60) + 'm';
    if (s < 86400) return Math.floor(s / 3600) + 'h';
    return Math.floor(s / 86400) + 'ngày';
  }

  function escHtml(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

  // ==================== AUTH ====================
  async function doLogin() {
    const username = document.getElementById('login-username')?.value.trim();
    const password = document.getElementById('login-password')?.value;
    if (!username || !password) return;
    const r = await api('POST', '/api/auth/login', { username, password });
    if (r.error) { toast(r.error, 'error'); return; }
    token = r.token; localStorage.setItem('cc_token', token);
    me = r.user;
    startApp();
  }

  async function autoLogin() {
    const params = new URLSearchParams(location.search);
    const uuid = params.get('uuid');
    if (uuid) {
      const r = await api('POST', '/api/auth/uuid', { uuid });
      if (!r.error) { token = r.token; localStorage.setItem('cc_token', token); me = r.user; startApp(); return; }
    }
    if (token) {
      try {
        const r = await api('GET', '/api/auth/me');
        if (r._id) { me = r; startApp(); return; }
      } catch { }
      token = '';
      localStorage.removeItem('cc_token');
    }
    showAuthScreen();
  }

  function showAuthScreen() {
    document.body.innerHTML = `
      <div style="position:fixed; inset:0; background:radial-gradient(circle at 10% 20%, #121624, #05070a); display:flex; align-items:center; justify-content:center; z-index:1000;">
        <div style="background:var(--glass-bg-solid); backdrop-filter:blur(20px); border:1px solid var(--glass-border); border-radius:32px; padding:32px; width:90%; max-width:380px;">
          <div style="display:flex; align-items:center; gap:12px; margin-bottom:24px;">
            <div class="logo-icon" style="width:48px; height:48px;">✨</div>
            <div><h2 style="font-size:22px;">abcxyz</h2><p style="font-size:11px; color:var(--text-muted);">official app server</p></div>
          </div>
          <div style="display:flex; gap:8px; margin-bottom:20px;">
            <button id="authLoginTab" class="btn-glass" style="flex:1;">Đăng nhập</button>
            <button id="authRegTab" class="btn-glass" style="flex:1;">Đăng ký</button>
          </div>
          <div id="loginForm">
            <input id="login-username" class="glass-input" placeholder="Tên đăng nhập" style="margin-bottom:12px;">
            <input id="login-password" type="password" class="glass-input" placeholder="Mật khẩu" style="margin-bottom:16px;">
            <button class="btn-glass btn-accent" style="width:100%;" onclick="doLogin()">Đăng nhập</button>
          </div>
          <div id="regForm" style="display:none;">
            <input id="reg-display" class="glass-input" placeholder="Tên hiển thị" style="margin-bottom:12px;">
            <input id="reg-username" class="glass-input" placeholder="Tên đăng nhập" style="margin-bottom:12px;">
            <input id="reg-password" type="password" class="glass-input" placeholder="Mật khẩu" style="margin-bottom:16px;">
            <button class="btn-glass btn-accent" style="width:100%;" onclick="doRegister()">Đăng ký</button>
          </div>
        </div>
      </div>
    `;
    document.getElementById('authLoginTab').onclick = () => { document.getElementById('loginForm').style.display = 'block'; document.getElementById('regForm').style.display = 'none'; };
    document.getElementById('authRegTab').onclick = () => { document.getElementById('loginForm').style.display = 'none'; document.getElementById('regForm').style.display = 'block'; };
  }

  async function doRegister() {
    const displayName = document.getElementById('reg-display').value.trim();
    const username = document.getElementById('reg-username').value.trim();
    const password = document.getElementById('reg-password').value;
    const r = await api('POST', '/api/auth/register', { username, password, displayName });
    if (r.error) { toast(r.error, 'error'); return; }
    token = r.token; localStorage.setItem('cc_token', token);
    me = r.user;
    startApp();
  }

  // ==================== APP START ====================
  function startApp() {
    document.body.innerHTML = ''; // clear auth screen
    location.reload(); // simple reload to re-initialize with logged in state
  }

  // Initialize after login
  function initApp() {
    initSocket();
    loadFeed();
    updateMyUI();
    loadConversations();
    loadGameOnline();
    setInterval(loadGameOnline, 10000);
    switchTab('feed');
  }

  function initSocket() {
    socket = io();
    socket.emit('auth', token);
    socket.emit('join_room', 'global');
    socket.emit('join_room', 'game');

    socket.on('new_message', msg => {
      if (msg.roomId === 'global' || msg.roomId === curRoom) appendMessage(msg);
      if (msg.roomId === 'global' && curTab === 'game') appendGameMessage(msg);
    });
    socket.on('new_post', post => { if (curTab === 'feed') prependPost(post); });
    socket.on('post_liked', ({ postId, likes }) => {
      const btn = document.querySelector(`[data-like="${postId}"]`);
      if (btn) btn.innerHTML = `❤️ ${likes}`;
    });
  }

  function updateMyUI() {
    if (!me) return;
    document.getElementById('profile-name').textContent = me.displayName || me.username;
    document.getElementById('profile-username').textContent = '@' + me.username;
    document.getElementById('profile-bio').textContent = me.bio || '';
    const avatarEl = document.getElementById('profile-avatar');
    avatarEl.textContent = (me.displayName || me.username)[0].toUpperCase();
    document.getElementById('composer-avatar').textContent = (me.displayName || me.username)[0].toUpperCase();
  }

  // ==================== FEED ====================
  async function loadFeed() {
    const r = await api('GET', '/api/posts?page=1');
    if (!Array.isArray(r)) return;
    const list = document.getElementById('posts-list');
    list.innerHTML = '';
    r.forEach(p => list.appendChild(buildPostEl(p)));
  }

  function buildPostEl(post) {
    const div = document.createElement('div');
    div.className = 'glass-card';
    div.style.padding = '16px';
    div.dataset.post = post._id;
    const liked = post.likes?.includes(me?._id);
    div.innerHTML = `
      <div style="display:flex; gap:12px;">
        <div class="room-avatar" style="width:40px; height:40px;">${(post.authorName || '?')[0].toUpperCase()}</div>
        <div><b>${escHtml(post.authorName)}</b><div style="font-size:11px; color:var(--text-muted)">${timeAgo(post.createdAt)}</div></div>
      </div>
      <div style="margin-top:12px; word-break:break-word;">${escHtml(post.content)}</div>
      ${post.image ? `<img src="${post.image}" style="max-width:100%; border-radius:16px; margin-top:12px;">` : ''}
      <div style="margin-top:12px; display:flex; gap:16px;">
        <button class="btn-glass" data-like="${post._id}" onclick="likePost('${post._id}', this)">❤️ ${post.likes?.length || 0}</button>
        <button class="btn-glass" onclick="toggleComments('${post._id}')">💬 ${post.comments?.length || 0}</button>
      </div>
      <div id="comments-${post._id}" style="display:none; margin-top:12px;">
        ${(post.comments || []).map(c => `<div style="margin-top:8px;"><b>${escHtml(c.authorName)}</b>: ${escHtml(c.content)}</div>`).join('')}
        <div style="display:flex; gap:8px; margin-top:12px;">
          <input class="glass-input" id="comment-${post._id}" placeholder="Viết bình luận..." style="flex:1;">
          <button class="btn-glass" onclick="submitComment('${post._id}')">Gửi</button>
        </div>
      </div>
    `;
    return div;
  }

  function prependPost(post) {
    const list = document.getElementById('posts-list');
    list.insertBefore(buildPostEl(post), list.firstChild);
  }

  async function submitPost() {
    const content = document.getElementById('post-input').value.trim();
    if (!content) return toast('Nhập nội dung', 'error');
    const r = await api('POST', '/api/posts', { content, image: postImageB64 });
    if (r.error) return toast(r.error, 'error');
    document.getElementById('post-input').value = '';
    postImageB64 = '';
    document.getElementById('post-preview').style.display = 'none';
    prependPost(r);
    toast('Đã đăng bài!');
  }

  async function likePost(id, btn) {
    const r = await api('POST', `/api/posts/${id}/like`);
    if (r.error) return;
    btn.innerHTML = `❤️ ${r.likes}`;
  }

  async function submitComment(postId) {
    const input = document.getElementById(`comment-${postId}`);
    if (!input.value.trim()) return;
    const r = await api('POST', `/api/posts/${postId}/comment`, { content: input.value.trim() });
    if (!r.error) { input.value = ''; toast('Đã bình luận'); loadFeed(); }
  }

  function toggleComments(id) {
    const sec = document.getElementById('comments-' + id);
    if (sec) sec.style.display = sec.style.display === 'none' ? 'block' : 'none';
  }

  // ==================== CHAT ====================
  async function loadConversations() {
    const list = document.getElementById('sidebar-list');
    list.innerHTML = `
      <div class="chat-room-item" data-room="global">
        <div class="room-avatar">🌐</div>
        <div class="room-info"><div class="room-name">#Global Chat</div><div class="room-sub">Mindustry cộng đồng</div></div>
      </div>
    `;
    document.querySelector('[data-room="global"]').onclick = () => openRoom('global', '#Global Chat');
    if (curRoom === 'global') document.querySelector('[data-room="global"]')?.classList.add('active');
  }

  async function openRoom(roomId, displayName) {
    curRoom = roomId;
    document.getElementById('topbar-title').textContent = displayName;
    document.getElementById('topbar-sub').textContent = 'Trò chuyện';
    const r = await api('GET', `/api/messages/${roomId}?limit=50`);
    const container = document.getElementById('chat-messages');
    container.innerHTML = '';
    if (Array.isArray(r)) r.forEach(m => appendMessage(m));
    if (curTab !== 'chat') switchTab('chat');
  }

  function appendMessage(msg) {
    const container = document.getElementById('chat-messages');
    if (!container) return;
    const isOwn = msg.senderId === me?._id;
    const row = document.createElement('div');
    row.className = `message-row ${isOwn ? 'own' : ''}`;
    row.innerHTML = `
      <div class="msg-avatar" style="background:${avatarBg({ displayName: msg.senderName })}">${(msg.senderName || '?')[0].toUpperCase()}</div>
      <div class="msg-content-wrapper">
        ${!isOwn ? `<div class="msg-sender">${escHtml(msg.senderName)}</div>` : ''}
        <div class="msg-bubble">${escHtml(msg.content)}</div>
        <div class="msg-time">${timeAgo(msg.createdAt)}</div>
      </div>
    `;
    if (isOwn) row.style.flexDirection = 'row-reverse';
    container.appendChild(row);
    container.scrollTop = container.scrollHeight;
  }

  function sendMessage() {
    const input = document.getElementById('chat-input');
    const content = input.value.trim();
    if (!content) return;
    socket?.emit('send_message', { roomId: curRoom, content, token });
    input.value = '';
  }

  // ==================== GAME ====================
  async function loadGameMessages() {
    const r = await api('GET', `/api/messages/global?limit=50`);
    const container = document.getElementById('game-messages');
    container.innerHTML = '';
    if (Array.isArray(r)) r.forEach(m => appendGameMessage(m));
  }

  function appendGameMessage(msg) {
    const container = document.getElementById('game-messages');
    if (!container) return;
    const isOwn = msg.senderId === me?._id;
    const row = document.createElement('div');
    row.className = `message-row ${isOwn ? 'own' : ''}`;
    row.innerHTML = `
      <div class="msg-avatar" style="background:${msg.fromGame ? 'var(--accent)' : avatarBg({ displayName: msg.senderName })}">${(msg.senderName || '?')[0].toUpperCase()}</div>
      <div class="msg-content-wrapper">
        ${!isOwn ? `<div class="msg-sender">${escHtml(msg.senderName)}${msg.fromGame ? ' 🎮' : ''}</div>` : ''}
        <div class="msg-bubble">${escHtml(msg.content)}</div>
        <div class="msg-time">${timeAgo(msg.createdAt)}</div>
      </div>
    `;
    if (isOwn) row.style.flexDirection = 'row-reverse';
    container.appendChild(row);
    container.scrollTop = container.scrollHeight;
  }

  function sendGameMessage() {
    const input = document.getElementById('game-input');
    const content = input.value.trim();
    if (!content) return;
    socket?.emit('send_message', { roomId: 'global', content, token });
    input.value = '';
  }

  async function loadGameOnline() {
    const r = await api('GET', '/api/game/online');
    const list = document.getElementById('game-online-list');
    const countEl = document.getElementById('online-count');
    if (!list) return;
    const totalOnline = r.count || 0;
    countEl.textContent = `● ${totalOnline} online`;
    if (!r.users?.length) { list.innerHTML = '<span style="color:var(--text-muted);">Không có ai</span>'; return; }
    list.innerHTML = r.users.slice(0, 8).map(u => `<span style="background:rgba(255,255,255,0.1); padding:4px 12px; border-radius:20px; font-size:11px;">🎮 ${escHtml(u.displayName || u.username)}</span>`).join('');
  }

  // ==================== PROFILE ====================
  async function loadMyProfile() {
    const r = await api('GET', `/api/profile/${me._id}`);
    if (r.user) {
      me = { ...me, ...r.user };
      updateMyUI();
      const profilePosts = document.getElementById('profile-posts');
      profilePosts.innerHTML = '';
      (r.posts || []).forEach(p => {
        const div = document.createElement('div');
        div.className = 'glass-card';
        div.style.padding = '12px';
        div.textContent = p.content;
        profilePosts.appendChild(div);
      });
    }
  }

  function openEditProfile() {
    document.getElementById('edit-display').value = me.displayName || '';
    document.getElementById('edit-bio').value = me.bio || '';
    document.getElementById('edit-modal').style.display = 'flex';
  }

  function closeEditModal() { document.getElementById('edit-modal').style.display = 'none'; }

  async function saveProfile() {
    const displayName = document.getElementById('edit-display').value.trim();
    const bio = document.getElementById('edit-bio').value.trim();
    const r = await api('PUT', '/api/profile', { displayName, bio });
    if (r.error) return toast(r.error, 'error');
    me = { ...me, displayName: r.displayName, bio: r.bio };
    updateMyUI();
    closeEditModal();
    toast('Đã lưu hồ sơ!');
  }

  // ==================== TAB & SEARCH ====================
  function switchTab(tab) {
    curTab = tab;
    document.getElementById('feed-view').style.display = tab === 'feed' ? 'flex' : 'none';
    document.getElementById('chat-view').style.display = tab === 'chat' ? 'flex' : 'none';
    document.getElementById('game-view').style.display = tab === 'game' ? 'flex' : 'none';
    document.getElementById('profile-view').style.display = tab === 'profile' ? 'flex' : 'none';
    document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelector(`.nav-btn[data-tab="${tab}"]`).classList.add('active');
    const titles = { feed: 'abcxyz Feed', chat: 'Trò chuyện', game: 'Mindustry Bridge', profile: 'Hồ sơ' };
    document.getElementById('topbar-title').textContent = titles[tab];
    if (tab === 'feed') loadFeed();
    if (tab === 'chat') loadConversations();
    if (tab === 'game') loadGameMessages();
    if (tab === 'profile') loadMyProfile();
  }

  async function onSearch(q) {
    if (!q.trim()) { loadConversations(); return; }
    const r = await api('GET', `/api/users/search?q=${encodeURIComponent(q)}`);
    const list = document.getElementById('sidebar-list');
    list.innerHTML = '';
    (r || []).filter(u => u._id !== me?._id).forEach(u => {
      const el = document.createElement('div');
      el.className = 'chat-room-item';
      el.innerHTML = `<div class="room-avatar">${(u.displayName || u.username)[0].toUpperCase()}</div><div class="room-info"><div class="room-name">${escHtml(u.displayName || u.username)}</div><div class="room-sub">@${escHtml(u.username)}</div></div>`;
      el.onclick = () => {
        const roomId = [me._id, u._id].sort().join('_');
        switchTab('chat');
        openRoom(roomId, u.displayName || u.username);
      };
      list.appendChild(el);
    });
  }

  function closeMobileSidebar() {
    document.getElementById('mobileSidebar').classList.remove('mobile-open');
    document.getElementById('sidebarBackdrop').classList.remove('active');
  }

  // ==================== EVENT BINDINGS ====================
  window.onload = () => {
    if (token && me) {
      initApp();
    } else {
      autoLogin();
    }
  };

  window.doLogin = doLogin;
  window.doRegister = doRegister;
  window.submitPost = submitPost;
  window.likePost = likePost;
  window.submitComment = submitComment;
  window.toggleComments = toggleComments;
  window.sendMessage = sendMessage;
  window.sendGameMessage = sendGameMessage;
  window.openEditProfile = openEditProfile;
  window.closeEditModal = closeEditModal;
  window.saveProfile = saveProfile;
  window.switchTab = switchTab;
  window.onSearch = onSearch;
  window.closeMobileSidebar = closeMobileSidebar;

  document.getElementById('menuToggleBtn')?.addEventListener('click', () => {
    document.getElementById('mobileSidebar').classList.add('mobile-open');
    document.getElementById('sidebarBackdrop').classList.add('active');
  });
  document.getElementById('submitPostBtn')?.addEventListener('click', submitPost);
  document.getElementById('sendChatBtn')?.addEventListener('click', sendMessage);
  document.getElementById('sendGameBtn')?.addEventListener('click', sendGameMessage);
  document.getElementById('editProfileBtn')?.addEventListener('click', openEditProfile);
  document.getElementById('saveProfileBtn')?.addEventListener('click', saveProfile);
  document.getElementById('sidebar-search')?.addEventListener('input', (e) => onSearch(e.target.value));
  document.getElementById('chat-input')?.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
  document.getElementById('game-input')?.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendGameMessage(); } });
  document.getElementById('attachImageBtn')?.addEventListener('click', () => {
    const inp = document.createElement('input');
    inp.type = 'file'; inp.accept = 'image/*';
    inp.onchange = (e) => {
      const reader = new FileReader();
      reader.onload = ev => { postImageB64 = ev.target.result; document.getElementById('post-preview').innerHTML = `<img src="${postImageB64}" style="max-height:100px; border-radius:12px;">`; document.getElementById('post-preview').style.display = 'block'; };
      reader.readAsDataURL(e.target.files[0]);
    };
    inp.click();
  });

  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', () => { switchTab(btn.dataset.tab); closeMobileSidebar(); });
  });
</script>
</body>
</html>
