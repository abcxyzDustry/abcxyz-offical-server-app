<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CraborChat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
:root {
  --bg:       #0d0f14;
  --surface:  #141720;
  --card:     #1a1e2e;
  --border:   #252a3a;
  --accent:   #e8504a;
  --accent2:  #ff7b75;
  --gold:     #f5c842;
  --green:    #2ed573;
  --blue:     #4a9eff;
  --text:     #e8eaf0;
  --muted:    #6b7280;
  --radius:   14px;
  --font:     'Space Grotesk', sans-serif;
  --mono:     'JetBrains Mono', monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);height:100vh;overflow:hidden;display:flex}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* ── SIDEBAR ── */
#sidebar{
  width:280px;min-width:280px;background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  transition:width .3s;
}
.sidebar-logo{
  padding:20px 18px 14px;
  display:flex;align-items:center;gap:10px;
  border-bottom:1px solid var(--border);
}
.logo-icon{
  width:38px;height:38px;background:var(--accent);border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:700;color:#fff;letter-spacing:-1px;
  flex-shrink:0;
}
.logo-text{font-size:17px;font-weight:700;color:var(--text)}
.logo-sub{font-size:10px;color:var(--muted);font-family:var(--mono)}

.sidebar-nav{
  display:flex;gap:2px;padding:12px;
  border-bottom:1px solid var(--border);
}
.nav-btn{
  flex:1;padding:8px 4px;border:none;background:transparent;
  color:var(--muted);cursor:pointer;border-radius:8px;
  font-family:var(--font);font-size:11px;font-weight:500;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  transition:.2s;
}
.nav-btn:hover{background:var(--card);color:var(--text)}
.nav-btn.active{background:var(--accent);color:#fff}
.nav-btn .icon{font-size:16px}

.sidebar-search{padding:10px 12px}
.search-input{
  width:100%;padding:8px 12px;background:var(--card);
  border:1px solid var(--border);border-radius:10px;
  color:var(--text);font-family:var(--font);font-size:13px;outline:none;
  transition:.2s;
}
.search-input:focus{border-color:var(--accent)}

.sidebar-list{flex:1;overflow-y:auto;padding:4px 8px}
.sidebar-item{
  padding:10px 10px;border-radius:10px;cursor:pointer;
  display:flex;align-items:center;gap:10px;
  transition:.15s;margin-bottom:2px;position:relative;
}
.sidebar-item:hover{background:var(--card)}
.sidebar-item.active{background:var(--card)}
.sidebar-item.unread::after{
  content:'';width:8px;height:8px;background:var(--accent);
  border-radius:50%;position:absolute;right:12px;top:50%;transform:translateY(-50%);
}
.item-avatar{
  width:38px;height:38px;border-radius:50%;background:var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;color:var(--text);flex-shrink:0;
  overflow:hidden;position:relative;
}
.item-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.online-dot{
  position:absolute;bottom:1px;right:1px;width:10px;height:10px;
  background:var(--green);border:2px solid var(--surface);border-radius:50%;
}
.item-info{flex:1;min-width:0}
.item-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-sub{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}

/* ── MAIN ── */
#main{flex:1;display:flex;flex-direction:column;min-width:0}
#topbar{
  height:58px;padding:0 22px;
  background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-avatar{width:36px;height:36px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-weight:700;overflow:hidden;flex-shrink:0}
.topbar-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.topbar-title{font-size:15px;font-weight:700}
.topbar-sub{font-size:11px;color:var(--muted)}
.topbar-right{display:flex;gap:8px}
.icon-btn{
  width:34px;height:34px;border-radius:8px;border:none;
  background:var(--card);color:var(--text);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;transition:.2s;
}
.icon-btn:hover{background:var(--border)}

#content{flex:1;overflow:hidden;display:flex;flex-direction:column}

/* ── FEED ── */
#feed-view{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;align-items:center}
.post-composer{
  width:100%;max-width:600px;background:var(--card);
  border:1px solid var(--border);border-radius:var(--radius);padding:16px;
}
.composer-row{display:flex;gap:12px;align-items:flex-start}
.composer-input{
  flex:1;background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:10px 14px;color:var(--text);
  font-family:var(--font);font-size:14px;resize:none;outline:none;
  min-height:44px;max-height:120px;transition:.2s;
}
.composer-input:focus{border-color:var(--accent)}
.composer-actions{display:flex;justify-content:flex-end;margin-top:10px;gap:8px}

.post-card{
  width:100%;max-width:600px;background:var(--card);
  border:1px solid var(--border);border-radius:var(--radius);
  overflow:hidden;
  animation:slideIn .3s ease;
}
@keyframes slideIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.post-header{padding:14px 16px 0;display:flex;align-items:center;gap:10px}
.post-author{font-size:14px;font-weight:600}
.post-time{font-size:11px;color:var(--muted);margin-left:auto}
.game-badge{
  font-size:9px;font-family:var(--mono);background:var(--accent);
  color:#fff;padding:2px 6px;border-radius:4px;font-weight:600;
  margin-left:6px;
}
.post-body{padding:12px 16px;font-size:14px;line-height:1.6;white-space:pre-wrap}
.post-image{width:100%;max-height:300px;object-fit:cover}
.post-actions{
  padding:8px 16px 12px;display:flex;gap:4px;
  border-top:1px solid var(--border);margin-top:4px;
}
.action-btn{
  padding:6px 14px;border:none;background:transparent;
  color:var(--muted);cursor:pointer;border-radius:8px;
  font-family:var(--font);font-size:13px;font-weight:500;
  display:flex;align-items:center;gap:6px;transition:.2s;
}
.action-btn:hover{background:var(--surface);color:var(--text)}
.action-btn.liked{color:var(--accent)}

.comments-section{border-top:1px solid var(--border);padding:8px 16px}
.comment-item{display:flex;gap:8px;padding:6px 0}
.comment-content{flex:1}
.comment-author{font-size:12px;font-weight:600;color:var(--accent)}
.comment-text{font-size:13px;margin-top:2px;line-height:1.5}
.comment-input-row{display:flex;gap:8px;margin-top:8px}
.comment-input{
  flex:1;background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:7px 14px;color:var(--text);
  font-family:var(--font);font-size:13px;outline:none;transition:.2s;
}
.comment-input:focus{border-color:var(--accent)}

/* ── CHAT ── */
#chat-view{flex:1;display:flex;flex-direction:column;min-height:0}
.chat-messages{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:10px}
.msg-row{display:flex;gap:10px;align-items:flex-end}
.msg-row.own{flex-direction:row-reverse}
.msg-avatar{width:28px;height:28px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;overflow:hidden}
.msg-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.msg-bubble{
  max-width:72%;padding:9px 14px;border-radius:16px;
  font-size:14px;line-height:1.5;word-break:break-word;
}
.msg-row:not(.own) .msg-bubble{background:var(--card);border-bottom-left-radius:4px}
.msg-row.own .msg-bubble{background:var(--accent);color:#fff;border-bottom-right-radius:4px}
.msg-row.game .msg-bubble{background:var(--card);border:1px solid var(--accent);border-bottom-left-radius:4px}
.msg-meta{font-size:10px;color:var(--muted);margin-top:3px;display:flex;align-items:center;gap:4px}
.msg-row.own .msg-meta{justify-content:flex-end}
.game-tag{font-size:9px;font-family:var(--mono);background:var(--accent);color:#fff;padding:1px 5px;border-radius:3px}
.msg-sender{font-size:11px;font-weight:600;color:var(--accent);margin-bottom:2px}
.msg-group{display:flex;flex-direction:column;gap:2px;max-width:72%}
.msg-row.own .msg-group{align-items:flex-end}

.chat-input-area{
  padding:14px 18px;background:var(--surface);
  border-top:1px solid var(--border);
  display:flex;gap:10px;align-items:flex-end;
}
.chat-input{
  flex:1;background:var(--card);border:1px solid var(--border);
  border-radius:22px;padding:10px 16px;color:var(--text);
  font-family:var(--font);font-size:14px;resize:none;outline:none;
  min-height:44px;max-height:120px;transition:.2s;
}
.chat-input:focus{border-color:var(--accent)}

/* ── PROFILE ── */
#profile-view{flex:1;overflow-y:auto;padding:20px}
.profile-header{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;margin-bottom:20px;
}
.profile-cover{
  height:160px;background:linear-gradient(135deg,var(--accent) 0%,#6c3f3f 100%);
  position:relative;
}
.profile-avatar-wrap{
  position:absolute;bottom:-36px;left:24px;
  width:72px;height:72px;border-radius:50%;border:3px solid var(--card);
  background:var(--surface);overflow:hidden;cursor:pointer;
}
.profile-avatar-wrap img{width:100%;height:100%;object-fit:cover}
.profile-avatar-wrap .avatar-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700}
.profile-info{padding:50px 24px 20px}
.profile-name{font-size:20px;font-weight:700}
.profile-username{font-size:13px;color:var(--muted);margin-top:2px;font-family:var(--mono)}
.profile-bio{font-size:14px;color:var(--text);margin-top:10px;line-height:1.6}
.profile-meta{display:flex;gap:20px;margin-top:12px}
.meta-item{display:flex;flex-direction:column;align-items:center}
.meta-num{font-size:16px;font-weight:700}
.meta-label{font-size:11px;color:var(--muted)}
.profile-edit-btn{
  margin-top:14px;padding:8px 22px;background:var(--surface);
  border:1px solid var(--border);border-radius:8px;color:var(--text);
  cursor:pointer;font-family:var(--font);font-size:13px;font-weight:600;
  transition:.2s;
}
.profile-edit-btn:hover{border-color:var(--accent);color:var(--accent)}

/* ── AUTH SCREEN ── */
#auth-screen{
  position:fixed;inset:0;background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  z-index:100;
}
.auth-card{
  width:380px;background:var(--card);border:1px solid var(--border);
  border-radius:20px;padding:36px 32px;
}
.auth-logo{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.auth-title{font-size:22px;font-weight:700;margin-bottom:4px}
.auth-sub{font-size:13px;color:var(--muted);margin-bottom:24px}
.auth-tab-row{display:flex;gap:4px;margin-bottom:22px;background:var(--surface);padding:4px;border-radius:10px}
.auth-tab{flex:1;padding:8px;border:none;background:transparent;color:var(--muted);cursor:pointer;border-radius:7px;font-family:var(--font);font-size:13px;font-weight:600;transition:.2s}
.auth-tab.active{background:var(--accent);color:#fff}
.form-group{margin-bottom:14px}
.form-label{font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px;display:block}
.form-input{
  width:100%;padding:10px 14px;background:var(--surface);
  border:1px solid var(--border);border-radius:10px;
  color:var(--text);font-family:var(--font);font-size:14px;outline:none;transition:.2s;
}
.form-input:focus{border-color:var(--accent)}
.form-input::placeholder{color:var(--muted)}
.auth-divider{text-align:center;font-size:12px;color:var(--muted);margin:16px 0;position:relative}
.auth-divider::before,.auth-divider::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:var(--border)}
.auth-divider::before{left:0}.auth-divider::after{right:0}

/* ── BUTTONS ── */
.btn{
  padding:10px 20px;border:none;border-radius:10px;cursor:pointer;
  font-family:var(--font);font-size:14px;font-weight:600;
  transition:.2s;display:inline-flex;align-items:center;justify-content:center;gap:7px;
}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-secondary{background:var(--surface);border:1px solid var(--border);color:var(--text)}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:6px 14px;font-size:12px;border-radius:8px}
.btn-full{width:100%}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* ── MODAL ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.7);
  display:flex;align-items:center;justify-content:center;z-index:200;
  opacity:0;pointer-events:none;transition:.2s;
}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{
  background:var(--card);border:1px solid var(--border);
  border-radius:16px;padding:24px;width:420px;max-width:95vw;
  transform:scale(.95);transition:.2s;
}
.modal-overlay.open .modal{transform:scale(1)}
.modal-title{font-size:17px;font-weight:700;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:24px;right:24px;z-index:999;
  display:flex;flex-direction:column;gap:8px;
}
.toast-item{
  padding:11px 18px;background:var(--card);border:1px solid var(--border);
  border-radius:10px;font-size:13px;font-weight:500;
  animation:toastIn .3s ease;box-shadow:0 8px 24px rgba(0,0,0,.4);
  display:flex;align-items:center;gap:8px;
}
.toast-item.success{border-color:var(--green);color:var(--green)}
.toast-item.error{border-color:var(--accent);color:var(--accent)}
@keyframes toastIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}

/* ── EMPTY STATE ── */
.empty-state{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:var(--muted);gap:12px;padding:40px;text-align:center;
}
.empty-state .icon{font-size:48px;opacity:.4}
.empty-state h3{font-size:16px;font-weight:600;color:var(--text)}
.empty-state p{font-size:13px;line-height:1.6}

/* ── GAME ONLINE PANEL ── */
.game-online-panel{
  padding:10px 12px;border-top:1px solid var(--border);
  background:var(--bg);
}
.game-online-title{font-size:10px;font-family:var(--mono);color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.game-online-list{display:flex;flex-direction:column;gap:3px;max-height:100px;overflow-y:auto}
.game-user{
  font-size:11px;color:var(--text);display:flex;align-items:center;gap:5px;padding:2px 0;
}
.game-dot{width:6px;height:6px;background:var(--accent);border-radius:50%;flex-shrink:0}

/* ── RESPONSIVE ── */
@media (max-width:600px){
  #sidebar{display:none}
}
</style>
</head>
<body>

<!-- ══ AUTH SCREEN ══ -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">CR</div>
      <div>
        <div style="font-size:20px;font-weight:700">CraborChat</div>
        <div style="font-size:11px;color:var(--muted);font-family:var(--mono)">Mindustry Social</div>
      </div>
    </div>
    <div class="auth-tab-row">
      <button class="auth-tab active" onclick="switchAuthTab('login')">Đăng nhập</button>
      <button class="auth-tab" onclick="switchAuthTab('register')">Đăng ký</button>
    </div>
    <div id="login-form">
      <div class="form-group">
        <label class="form-label">TÊN ĐĂNG NHẬP</label>
        <input class="form-input" id="login-username" type="text" placeholder="username" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <div class="form-group">
        <label class="form-label">MẬT KHẨU</label>
        <input class="form-input" id="login-password" type="password" placeholder="••••••" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <button class="btn btn-primary btn-full" onclick="doLogin()" id="login-btn">Đăng nhập</button>
      <div class="auth-divider">HOẶC</div>
      <div style="font-size:12px;color:var(--muted);text-align:center">Từ Mindustry: gõ <span style="font-family:var(--mono);color:var(--accent)">/web</span> trong game</div>
    </div>
    <div id="register-form" style="display:none">
      <div class="form-group">
        <label class="form-label">TÊN HIỂN THỊ</label>
        <input class="form-input" id="reg-display" type="text" placeholder="Tên của bạn">
      </div>
      <div class="form-group">
        <label class="form-label">TÊN ĐĂNG NHẬP</label>
        <input class="form-input" id="reg-username" type="text" placeholder="username">
      </div>
      <div class="form-group">
        <label class="form-label">MẬT KHẨU</label>
        <input class="form-input" id="reg-password" type="password" placeholder="Tối thiểu 6 ký tự">
      </div>
      <button class="btn btn-primary btn-full" onclick="doRegister()">Tạo tài khoản</button>
    </div>
  </div>
</div>

<!-- ══ MAIN APP ══ -->
<div id="app" style="display:none;flex:1;overflow:hidden;display:flex">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">CR</div>
      <div>
        <div class="logo-text">CraborChat</div>
        <div class="logo-sub" id="online-count">0 online</div>
      </div>
    </div>
    <div class="sidebar-nav">
      <button class="nav-btn active" id="nav-feed" onclick="switchTab('feed')">
        <span class="icon">📰</span>Feed
      </button>
      <button class="nav-btn" id="nav-chat" onclick="switchTab('chat')">
        <span class="icon">💬</span>Chat
      </button>
      <button class="nav-btn" id="nav-game" onclick="switchTab('game')">
        <span class="icon">🎮</span>Game
      </button>
      <button class="nav-btn" id="nav-profile" onclick="switchTab('profile')">
        <span class="icon">👤</span>Profile
      </button>
    </div>

    <!-- Dynamic list -->
    <div class="sidebar-search" id="sidebar-search-wrap">
      <input class="search-input" id="sidebar-search" placeholder="Tìm kiếm..." oninput="onSearch(this.value)">
    </div>
    <div class="sidebar-list" id="sidebar-list"></div>

    <!-- Game online players -->
    <div class="game-online-panel" id="game-online-panel" style="display:none">
      <div class="game-online-title">🎮 Đang chơi Mindustry</div>
      <div class="game-online-list" id="game-online-list"></div>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main">
    <!-- TOPBAR -->
    <div id="topbar">
      <div class="topbar-left">
        <div class="topbar-avatar" id="topbar-avatar">?</div>
        <div>
          <div class="topbar-title" id="topbar-title">Feed</div>
          <div class="topbar-sub" id="topbar-sub">Xem bài đăng mới nhất</div>
        </div>
      </div>
      <div class="topbar-right">
        <button class="icon-btn" title="Thông báo">🔔</button>
        <button class="icon-btn" onclick="switchTab('profile')" title="Profile">⚙️</button>
      </div>
    </div>

    <div id="content">
      <!-- FEED VIEW -->
      <div id="feed-view">
        <div class="post-composer">
          <div class="composer-row">
            <div class="item-avatar" id="composer-avatar" style="width:40px;height:40px;flex-shrink:0">?</div>
            <textarea class="composer-input" id="post-input" placeholder="Bạn đang nghĩ gì?" rows="2" onkeydown="if(event.ctrlKey&&event.key==='Enter')submitPost()"></textarea>
          </div>
          <div class="composer-actions">
            <button class="btn btn-secondary btn-sm" onclick="addImageToPost()">🖼 Ảnh</button>
            <button class="btn btn-primary btn-sm" onclick="submitPost()">Đăng bài</button>
          </div>
          <div id="post-preview" style="display:none;margin-top:8px"></div>
        </div>
        <div id="posts-list" style="width:100%;max-width:600px;display:flex;flex-direction:column;gap:14px"></div>
        <div style="height:40px"></div>
      </div>

      <!-- CHAT VIEW -->
      <div id="chat-view" style="display:none">
        <div class="chat-messages" id="chat-messages">
          <div class="empty-state">
            <div class="icon">💬</div>
            <h3>Chọn cuộc trò chuyện</h3>
            <p>Chọn từ danh sách bên trái hoặc vào #Global chat</p>
          </div>
        </div>
        <div class="chat-input-area">
          <textarea class="chat-input" id="chat-input" placeholder="Nhập tin nhắn..." rows="1"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"
            oninput="autoResize(this)"></textarea>
          <button class="btn btn-primary" style="padding:10px 18px;border-radius:22px" onclick="sendMessage()">
            Gửi
          </button>
        </div>
      </div>

      <!-- GAME CHAT VIEW -->
      <div id="game-view" style="display:none">
        <div class="chat-messages" id="game-messages"></div>
        <div class="chat-input-area">
          <textarea class="chat-input" id="game-input" placeholder="Nhắn tin tới Mindustry..." rows="1"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendGameMessage()}"
            oninput="autoResize(this)"></textarea>
          <button class="btn btn-primary" style="padding:10px 18px;border-radius:22px;background:var(--accent)" onclick="sendGameMessage()">
            → Game
          </button>
        </div>
      </div>

      <!-- PROFILE VIEW -->
      <div id="profile-view" style="display:none">
        <div class="profile-header">
          <div class="profile-cover" id="profile-cover"></div>
          <div style="position:relative">
            <div class="profile-avatar-wrap" id="my-avatar-wrap" onclick="changeAvatar()">
              <div class="avatar-placeholder" id="my-avatar">?</div>
            </div>
          </div>
          <div class="profile-info">
            <div class="profile-name" id="profile-name">Loading...</div>
            <div class="profile-username" id="profile-username">@...</div>
            <div class="profile-bio" id="profile-bio"></div>
            <div class="profile-meta">
              <div class="meta-item"><div class="meta-num" id="post-count">0</div><div class="meta-label">Bài đăng</div></div>
            </div>
            <button class="profile-edit-btn" onclick="openEditProfile()">✏️ Chỉnh sửa hồ sơ</button>
          </div>
        </div>
        <div id="profile-posts" style="display:flex;flex-direction:column;gap:14px;max-width:600px;margin:0 auto"></div>
      </div>
    </div>
  </div>
</div>

<!-- ══ MODALS ══ -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-title">Chỉnh sửa hồ sơ <button class="icon-btn" onclick="closeModal('edit-modal')">✕</button></div>
    <div class="form-group">
      <label class="form-label">TÊN HIỂN THỊ</label>
      <input class="form-input" id="edit-display" type="text">
    </div>
    <div class="form-group">
      <label class="form-label">GIỚI THIỆU</label>
      <textarea class="form-input" id="edit-bio" rows="3" style="resize:vertical"></textarea>
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn btn-secondary" onclick="closeModal('edit-modal')">Hủy</button>
      <button class="btn btn-primary" onclick="saveProfile()">Lưu</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ==================== STATE ====================
let token    = localStorage.getItem('cc_token') || '';
let me       = null;
let socket   = null;
let curRoom  = 'global';
let curTab   = 'feed';
let postImageB64 = '';
let lastGamePoll = Date.now() - 5000;

const API = '';  // same origin

// ==================== UTILS ====================
function toast(msg, type='success') {
  const el = document.createElement('div');
  el.className = 'toast-item ' + type;
  el.textContent = msg;
  document.getElementById('toast').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

function avatar(user, size=38) {
  if (user?.avatar) return `<img src="${user.avatar}" style="width:${size}px;height:${size}px;object-fit:cover;border-radius:50%">`;
  const name = user?.displayName || user?.username || '?';
  return `<span style="font-size:${Math.floor(size*0.38)}px;font-weight:700">${name[0].toUpperCase()}</span>`;
}

function avatarBg(user) {
  const colors = ['#e8504a','#4a9eff','#2ed573','#f5c842','#9b59b6','#e17055'];
  const name = user?.displayName || user?.username || '?';
  return colors[name.charCodeAt(0) % colors.length];
}

function timeAgo(d) {
  const s = (Date.now() - new Date(d).getTime()) / 1000;
  if (s < 60) return 'vừa xong';
  if (s < 3600) return Math.floor(s/60) + 'm';
  if (s < 86400) return Math.floor(s/3600) + 'h';
  return Math.floor(s/86400) + 'ngày';
}

async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (token) opts.headers['Authorization'] = 'Bearer ' + token;
  if (body)  opts.body = JSON.stringify(body);
  const r = await fetch(API + path, opts);
  return r.json();
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ==================== AUTH ====================
function switchAuthTab(tab) {
  document.getElementById('login-form').style.display    = tab==='login' ? 'block' : 'none';
  document.getElementById('register-form').style.display = tab==='register' ? 'block' : 'none';
  document.querySelectorAll('.auth-tab').forEach((b,i) => b.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')));
}

async function doLogin() {
  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = '...';
  try {
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;
    const r = await api('POST', '/api/auth/login', { username, password });
    if (r.error) { toast(r.error, 'error'); return; }
    token = r.token; localStorage.setItem('cc_token', token);
    me = r.user;
    startApp();
  } catch(e) { toast('Lỗi kết nối', 'error'); }
  finally { btn.disabled=false; btn.textContent='Đăng nhập'; }
}

async function doRegister() {
  try {
    const displayName = document.getElementById('reg-display').value.trim();
    const username    = document.getElementById('reg-username').value.trim();
    const password    = document.getElementById('reg-password').value;
    const r = await api('POST', '/api/auth/register', { username, password, displayName });
    if (r.error) { toast(r.error, 'error'); return; }
    token = r.token; localStorage.setItem('cc_token', token);
    me = r.user;
    startApp();
  } catch(e) { toast('Lỗi kết nối', 'error'); }
}

async function autoLogin() {
  // UUID login từ Mindustry (?uuid=xxx)
  const params = new URLSearchParams(location.search);
  const uuid   = params.get('uuid');
  if (uuid) {
    const r = await api('POST', '/api/auth/uuid', { uuid });
    if (!r.error) {
      token = r.token; localStorage.setItem('cc_token', token);
      me = r.user; startApp(); return;
    }
  }
  // Token lưu sẵn
  if (token) {
    try {
      const r = await api('GET', '/api/auth/me');
      if (r._id) { me = r; startApp(); return; }
    } catch {}
    token = ''; localStorage.removeItem('cc_token');
  }
  document.getElementById('auth-screen').style.display = 'flex';
}

// ==================== APP START ====================
function startApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display         = 'flex';
  initSocket();
  loadFeed();
  updateMyUI();
  loadConversations();
  loadGameMessages();
  // Poll game bridge
  setInterval(pollGameChat, 2000);
  setInterval(loadGameOnline, 10000);
  loadGameOnline();
}

function updateMyUI() {
  if (!me) return;
  const name = me.displayName || me.username;
  document.getElementById('profile-name').textContent    = name;
  document.getElementById('profile-username').textContent= '@' + me.username;
  document.getElementById('profile-bio').textContent     = me.bio || '';
  const avEl = document.getElementById('my-avatar');
  if (me.avatar) {
    avEl.innerHTML = `<img src="${me.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
  } else {
    avEl.textContent = name[0].toUpperCase();
    document.querySelector('.profile-avatar-wrap').style.background = avatarBg(me);
  }
  // Topbar
  const tb = document.getElementById('topbar-avatar');
  if (me.avatar) tb.innerHTML = `<img src="${me.avatar}" style="width:36px;height:36px;object-fit:cover;border-radius:50%">`;
  else { tb.textContent = name[0].toUpperCase(); tb.style.background = avatarBg(me); }
  // Composer
  const ca = document.getElementById('composer-avatar');
  ca.style.background = avatarBg(me);
  ca.innerHTML = me.avatar ? `<img src="${me.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">` : `<span style="font-size:14px;font-weight:700">${name[0].toUpperCase()}</span>`;
}

// ==================== SOCKET ====================
function initSocket() {
  socket = io();
  socket.emit('auth', token);
  socket.emit('join_room', 'global');
  socket.emit('join_room', 'game');

  socket.on('new_message', msg => {
    if (msg.roomId === 'global' || msg.roomId === curRoom) appendMessage(msg);
    if (msg.roomId === 'global' && curTab === 'game') appendGameMessage(msg);
  });
  socket.on('new_post', post => { if (curTab==='feed') prependPost(post); });
  socket.on('post_liked', ({postId, likes}) => {
    const btn = document.querySelector(`[data-like="${postId}"]`);
    if (btn) btn.innerHTML = `❤️ ${likes}`;
  });
  socket.on('post_commented', ({postId, comment}) => {
    const sec = document.querySelector(`[data-comments="${postId}"]`);
    if (sec) { const el=buildCommentEl(comment); sec.insertBefore(el, sec.querySelector('.comment-input-row')); }
  });
  socket.on('post_deleted', ({postId}) => {
    const el = document.querySelector(`[data-post="${postId}"]`);
    if (el) el.remove();
  });
  socket.on('user_online', ({userId}) => { updateOnlineDot(userId, true); });
  socket.on('user_offline',({userId}) => { updateOnlineDot(userId, false); });
}

// ==================== TAB SWITCHING ====================
function switchTab(tab) {
  curTab = tab;
  ['feed','chat','game','profile'].forEach(t => {
    const view = document.getElementById(t+'-view');
    const nav  = document.getElementById('nav-'+t);
    if (view) view.style.display = t===tab ? (t==='chat'||t==='game'?'flex':'block') : 'none';
    if (nav)  nav.classList.toggle('active', t===tab);
  });
  // Topbar
  const titles = {feed:'Feed',chat:'Messages',game:'🎮 Mindustry Chat',profile:'Profile'};
  const subs   = {feed:'Bài đăng mới nhất',chat:'Tin nhắn',game:'Chat với người chơi Mindustry',profile:'Hồ sơ cá nhân'};
  document.getElementById('topbar-title').textContent = titles[tab] || tab;
  document.getElementById('topbar-sub').textContent   = subs[tab] || '';
  // Sidebar
  document.getElementById('sidebar-search-wrap').style.display = tab==='chat'||tab==='game' ? 'block' : 'none';
  document.getElementById('game-online-panel').style.display   = tab==='game' ? 'block' : 'none';

  if (tab==='profile') { loadMyProfile(); }
  if (tab==='chat')    { loadConversations(); }
  if (tab==='game')    { loadGameMessages(); }
  if (tab==='feed')    { document.getElementById('sidebar-list').innerHTML=''; loadFeed(); }
}

// ==================== FEED ====================
let feedPage = 1;
let feedLoading = false;

async function loadFeed() {
  feedPage = 1;
  const r = await api('GET', '/api/posts?page=1');
  if (!Array.isArray(r)) return;
  const list = document.getElementById('posts-list');
  list.innerHTML = '';
  r.forEach(p => list.appendChild(buildPostEl(p)));
  document.getElementById('post-count').textContent = r.length;
}

function buildPostEl(post) {
  const div = document.createElement('div');
  div.className = 'post-card';
  div.dataset.post = post._id;
  const liked = post.likes?.includes(me?._id);
  const gameBadge = post.fromGame ? '<span class="game-badge">GAME</span>' : '';
  div.innerHTML = `
    <div class="post-header">
      <div class="item-avatar" style="background:${avatarBg({displayName:post.authorName})}">
        ${post.authorAvatar ? `<img src="${post.authorAvatar}">` : `<span style="font-size:14px;font-weight:700">${(post.authorName||'?')[0].toUpperCase()}</span>`}
      </div>
      <div>
        <div class="post-author">${post.authorName||'Unknown'}${gameBadge}</div>
        <div style="font-size:11px;color:var(--muted)">${timeAgo(post.createdAt)}</div>
      </div>
      ${post.authorId===me?._id ? `<button class="icon-btn" style="margin-left:auto" onclick="deletePost('${post._id}')">🗑</button>` : ''}
    </div>
    <div class="post-body">${escHtml(post.content)}</div>
    ${post.image ? `<img class="post-image" src="${post.image}" loading="lazy">` : ''}
    <div class="post-actions">
      <button class="action-btn ${liked?'liked':''}" data-like="${post._id}" onclick="likePost('${post._id}',this)">
        ❤️ ${post.likes?.length||0}
      </button>
      <button class="action-btn" onclick="toggleComments('${post._id}')">
        💬 ${post.comments?.length||0}
      </button>
    </div>
    <div class="comments-section" id="comments-${post._id}" data-comments="${post._id}" style="display:none">
      ${(post.comments||[]).map(c=>buildCommentEl(c).outerHTML).join('')}
      <div class="comment-input-row">
        <input class="comment-input" placeholder="Viết bình luận..." onkeydown="if(event.key==='Enter')submitComment('${post._id}',this)">
        <button class="btn btn-primary btn-sm" onclick="submitComment('${post._id}',this.previousElementSibling)">Gửi</button>
      </div>
    </div>`;
  return div;
}

function buildCommentEl(c) {
  const div = document.createElement('div');
  div.className = 'comment-item';
  div.innerHTML = `
    <div class="item-avatar" style="width:28px;height:28px;font-size:11px;background:${avatarBg({displayName:c.authorName})}">
      ${c.authorAvatar?`<img src="${c.authorAvatar}">`:`<span>${(c.authorName||'?')[0].toUpperCase()}</span>`}
    </div>
    <div class="comment-content">
      <span class="comment-author">${c.authorName||'?'}</span>
      <div class="comment-text">${escHtml(c.content)}</div>
    </div>`;
  return div;
}

function prependPost(post) {
  const list = document.getElementById('posts-list');
  const el   = buildPostEl(post);
  list.insertBefore(el, list.firstChild);
}

async function submitPost() {
  const input = document.getElementById('post-input');
  const content = input.value.trim();
  if (!content) { toast('Nhập nội dung bài đăng', 'error'); return; }
  const r = await api('POST', '/api/posts', { content, image: postImageB64 });
  if (r.error) { toast(r.error, 'error'); return; }
  input.value = ''; postImageB64 = '';
  document.getElementById('post-preview').style.display = 'none';
  toast('Đã đăng bài!');
  prependPost(r);
}

function addImageToPost() {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = 'image/*';
  inp.onchange = e => {
    const reader = new FileReader();
    reader.onload = ev => {
      postImageB64 = ev.target.result;
      const prev = document.getElementById('post-preview');
      prev.style.display = 'block';
      prev.innerHTML = `<img src="${postImageB64}" style="max-height:150px;border-radius:8px">`;
    };
    reader.readAsDataURL(e.target.files[0]);
  };
  inp.click();
}

async function likePost(id, btn) {
  const r = await api('POST', `/api/posts/${id}/like`);
  if (r.error) return;
  btn.innerHTML = `❤️ ${r.likes}`;
  btn.classList.toggle('liked', r.liked);
}

function toggleComments(id) {
  const sec = document.getElementById('comments-'+id);
  if (sec) sec.style.display = sec.style.display==='none' ? 'block' : 'none';
}

async function submitComment(postId, input) {
  if (!input.value.trim()) return;
  const r = await api('POST', `/api/posts/${postId}/comment`, { content: input.value.trim() });
  if (r.error) { toast(r.error,'error'); return; }
  input.value = '';
}

async function deletePost(id) {
  if (!confirm('Xóa bài đăng?')) return;
  const r = await api('DELETE', `/api/posts/${id}`);
  if (r.success) { document.querySelector(`[data-post="${id}"]`)?.remove(); toast('Đã xóa'); }
}

// ==================== CHAT ====================
async function loadConversations() {
  const list = document.getElementById('sidebar-list');
  list.innerHTML = '';
  // Add global room
  const globalEl = buildRoomItem({ name:'#Global', sub:'Chat chung', id:'global', icon:'🌐' });
  globalEl.onclick = () => openRoom('global', '#Global', null);
  list.appendChild(globalEl);
  if (curRoom==='global') globalEl.classList.add('active');
}

function buildRoomItem({ name, sub, id, icon, avatar: av }) {
  const el = document.createElement('div');
  el.className = 'sidebar-item';
  el.dataset.room = id;
  el.innerHTML = `
    <div class="item-avatar" style="background:var(--border)">
      ${av ? `<img src="${av}">` : `<span>${icon||name[0]}</span>`}
    </div>
    <div class="item-info">
      <div class="item-name">${name}</div>
      <div class="item-sub">${sub||''}</div>
    </div>`;
  return el;
}

async function openRoom(roomId, name, userInfo) {
  curRoom = roomId;
  socket?.emit('join_room', roomId);
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.toggle('active', el.dataset.room===roomId));
  document.getElementById('topbar-title').textContent = name;
  document.getElementById('topbar-sub').textContent   = userInfo?.isGameAccount ? '🎮 Game Account' : 'Đang trò chuyện';

  const msgs = document.getElementById('chat-messages');
  msgs.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:12px;padding:20px">Đang tải...</div>';

  const r = await api('GET', `/api/messages/${roomId}?limit=50`);
  msgs.innerHTML = '';
  if (Array.isArray(r)) r.forEach(m => appendMessage(m));
  msgs.scrollTop = msgs.scrollHeight;
}

function appendMessage(msg) {
  const container = document.getElementById('chat-messages');
  if (!container) return;

  const isOwn  = msg.senderId === me?._id;
  const isGame = msg.fromGame;

  const row = document.createElement('div');
  row.className = 'msg-row' + (isOwn?' own':'') + (isGame?' game':'');

  const av = document.createElement('div');
  av.className = 'msg-avatar';
  av.style.background = avatarBg({ displayName: msg.senderName });
  if (msg.senderAvatar) av.innerHTML = `<img src="${msg.senderAvatar}">`;
  else av.textContent = (msg.senderName||'?')[0].toUpperCase();

  const group = document.createElement('div');
  group.className = 'msg-group';
  if (!isOwn) group.innerHTML = `<div class="msg-sender">${msg.senderName||'?'}${isGame?'<span class="game-tag">GAME</span>':''}</div>`;

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = msg.content;

  const meta = document.createElement('div');
  meta.className = 'msg-meta';
  meta.textContent = timeAgo(msg.createdAt);

  group.appendChild(bubble);
  group.appendChild(meta);

  if (isOwn) row.appendChild(group);
  else { row.appendChild(av); row.appendChild(group); }

  container.appendChild(row);
  container.scrollTop = container.scrollHeight;
}

function sendMessage() {
  const input   = document.getElementById('chat-input');
  const content = input.value.trim();
  if (!content) return;
  socket?.emit('send_message', { roomId: curRoom, content, token });
  input.value = ''; input.style.height = 'auto';
}

// ==================== GAME CHAT ====================
async function loadGameMessages() {
  const r = await api('GET', `/api/messages/global?limit=50`);
  const container = document.getElementById('game-messages');
  container.innerHTML = '';
  if (Array.isArray(r)) r.forEach(m => appendGameMessage(m));
  container.scrollTop = container.scrollHeight;
}

function appendGameMessage(msg) {
  const container = document.getElementById('game-messages');
  if (!container) return;

  const isOwn  = msg.senderId === me?._id;
  const isGame = msg.fromGame;

  const row = document.createElement('div');
  row.className = 'msg-row' + (isOwn?' own':'') + (isGame?' game':'');

  const av = document.createElement('div');
  av.className = 'msg-avatar';
  av.style.background = isGame ? 'var(--accent)' : avatarBg({ displayName: msg.senderName });
  if (msg.senderAvatar) av.innerHTML = `<img src="${msg.senderAvatar}">`;
  else av.textContent = (msg.senderName||'?')[0].toUpperCase();

  const group = document.createElement('div');
  group.className = 'msg-group';
  if (!isOwn) group.innerHTML = `<div class="msg-sender">${msg.senderName||'?'}${isGame?'<span class="game-tag">🎮 GAME</span>':''}</div>`;

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = msg.content;

  const meta = document.createElement('div');
  meta.className = 'msg-meta';
  meta.textContent = timeAgo(msg.createdAt);

  group.appendChild(bubble); group.appendChild(meta);
  if (isOwn) row.appendChild(group);
  else { row.appendChild(av); row.appendChild(group); }

  container.appendChild(row);
  container.scrollTop = container.scrollHeight;
}

async function sendGameMessage() {
  const input   = document.getElementById('game-input');
  const content = input.value.trim();
  if (!content) return;
  // Gui len global room (se duoc relay sang game)
  socket?.emit('send_message', { roomId: 'global', content, token });
  input.value = ''; input.style.height = 'auto';
}

async function pollGameChat() {
  if (curTab !== 'game' && curTab !== 'chat') return;
  // Socket.io da xu ly real-time, poll nay chi la fallback
  // Khong can thiet khi socket dang hoat dong
}

async function loadGameOnline() {
  const r = await api('GET', '/api/game/online');
  const list = document.getElementById('game-online-list');
  const countEl = document.getElementById('online-count');
  if (!list) return;

  // Count tat ca online users
  const totalOnline = (r.count || 0);
  countEl.textContent = totalOnline + ' online';

  if (!r.users?.length) { list.innerHTML = '<div style="font-size:11px;color:var(--muted)">Không có ai đang chơi</div>'; return; }
  list.innerHTML = r.users.filter(u => u.isGameAccount).slice(0,8).map(u => `
    <div class="game-user">
      <div class="game-dot"></div>
      <span>${u.displayName || u.username}</span>
    </div>`).join('');
}

// ==================== PROFILE ====================
async function loadMyProfile() {
  const r = await api('GET', `/api/profile/${me._id}`);
  if (r.user) {
    me = { ...me, ...r.user };
    updateMyUI();
    const profilePosts = document.getElementById('profile-posts');
    profilePosts.innerHTML = '';
    (r.posts || []).forEach(p => profilePosts.appendChild(buildPostEl(p)));
    document.getElementById('post-count').textContent = (r.posts||[]).length;
  }
}

function openEditProfile() {
  document.getElementById('edit-display').value = me.displayName || '';
  document.getElementById('edit-bio').value      = me.bio || '';
  document.getElementById('edit-modal').classList.add('open');
}

async function saveProfile() {
  const displayName = document.getElementById('edit-display').value.trim();
  const bio         = document.getElementById('edit-bio').value.trim();
  const r = await api('PUT', '/api/profile', { displayName, bio });
  if (r.error) { toast(r.error, 'error'); return; }
  me = { ...me, displayName: r.displayName, bio: r.bio };
  updateMyUI();
  closeModal('edit-modal');
  toast('Đã lưu hồ sơ!');
}

function changeAvatar() {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = 'image/*';
  inp.onchange = e => {
    const reader = new FileReader();
    reader.onload = async ev => {
      const avatar = ev.target.result;
      const r = await api('PUT', '/api/profile', { avatar });
      if (r.error) { toast(r.error,'error'); return; }
      me.avatar = avatar;
      updateMyUI();
      toast('Đã đổi ảnh đại diện!');
    };
    reader.readAsDataURL(e.target.files[0]);
  };
  inp.click();
}

// ==================== SEARCH ====================
async function onSearch(q) {
  if (!q.trim()) { loadConversations(); return; }
  const r = await api('GET', `/api/users/search?q=${encodeURIComponent(q)}`);
  const list = document.getElementById('sidebar-list');
  list.innerHTML = '';
  if (!Array.isArray(r)) return;
  r.filter(u => u._id !== me?._id).forEach(u => {
    const el = buildRoomItem({ name: u.displayName||u.username, sub: '@'+u.username, id: u._id, av: u.avatar });
    el.onclick = () => {
      const roomId = [me._id, u._id].sort().join('_');
      switchTab('chat');
      openRoom(roomId, u.displayName||u.username, u);
    };
    list.appendChild(el);
  });
}

function updateOnlineDot(userId, online) {
  const el = document.querySelector(`.sidebar-item[data-room="${userId}"] .online-dot`);
  if (!el && online) { /* add dot */ }
}

// ==================== MODAL ====================
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.addEventListener('click', e => {
  if (e.target.classList.contains('modal-overlay')) e.target.classList.remove('open');
});

// ==================== HELPERS ====================
function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ==================== INIT ====================
autoLogin();
</script>
